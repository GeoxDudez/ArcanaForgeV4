<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArcanaForge — The Codex</title>
<meta name="theme-color" content="#0a0c11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0c11; --bg-1:#12141c;
  --panel:#181b24; --panel-2:#1f2330;
  --line:#2c313e; --line-soft:#22262f;
  --txt:#ece9e1; --txt-dim:#9aa0ad; --txt-faint:#646b78;
  --gold:#e3b352; --gold-soft:#f0cd80; --gold-deep:#b8893a;
  --blood:#c62a30; --blood-glow:#ff4d54;
  --down:#565b66; --pc:#5aa9d6; --enemy:#d6705a; --good:#5fae6a;
  --font-display:'Cinzel','Trajan Pro',Georgia,serif;
  --font-ui:'Spline Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  --radius:10px; --shadow:0 8px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--font-ui); color:var(--txt);
  background:
    radial-gradient(1200px 700px at 80% -10%, #1b2030 0%, transparent 55%),
    radial-gradient(1000px 800px at -10% 110%, #1a141a 0%, transparent 50%),
    linear-gradient(160deg,var(--bg-0),var(--bg-1));
  background-attachment:fixed; min-height:100%; overflow:hidden;
}
button{font-family:var(--font-ui);cursor:pointer;color:inherit}
input,select,textarea{font-family:var(--font-ui)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#3a4150}
::-webkit-scrollbar-track{background:transparent}

/* ---------- buttons / inputs ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel),var(--panel-2));color:var(--txt);
  padding:8px 13px;border-radius:8px;font-weight:600;font-size:13px;letter-spacing:.01em;
  transition:.14s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold-soft);transform:translateY(-1px)}
.btn.gold{background:linear-gradient(180deg,#e8bd5e,#cf9c3c);color:#231a07;border-color:#caa049}
.btn.gold:hover{color:#1a1304;filter:brightness(1.06)}
.btn.danger:hover{border-color:var(--blood);color:var(--blood-glow)}
.btn.sm{padding:5px 9px;font-size:12px}
.btn.icon{padding:7px 9px}
.inp{background:#0e1016;border:1px solid var(--line);color:var(--txt);border-radius:8px;
  padding:9px 12px;font-size:14px;width:100%;transition:.14s}
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(227,179,82,.12)}
textarea.inp{resize:vertical;min-height:74px;line-height:1.5}
label.fld{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--txt-faint);font-weight:600;margin:0 0 6px 2px}

/* ---------- shell ---------- */
#app{display:grid;grid-template-rows:auto 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:13px 20px;
  background:linear-gradient(180deg,rgba(24,27,36,.96),rgba(18,20,28,.96));
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:30}
.brand{display:flex;flex-direction:column;gap:1px;margin-right:6px;user-select:none}
.brand .eyebrow{font-size:10px;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;font-weight:600}
.brand .name{font-family:var(--font-display);font-weight:900;font-size:22px;letter-spacing:.04em;
  background:linear-gradient(180deg,#f6dca0,#cf9c3c);-webkit-background-clip:text;background-clip:text;color:transparent}
.searchwrap{position:relative;flex:1;max-width:520px}
.searchwrap input{padding-left:34px}
.searchwrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt-faint);font-size:14px;pointer-events:none}
.kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--txt-faint);
  border:1px solid var(--line);border-radius:5px;padding:2px 6px;letter-spacing:.05em}
.spacer{flex:1}
.toolbtns{display:flex;gap:8px;align-items:center}

.main{display:grid;grid-template-columns:288px 1fr;min-height:0}
/* ---------- sidebar ---------- */
.sidebar{border-right:1px solid var(--line);min-height:0;display:flex;flex-direction:column;background:rgba(14,16,22,.4)}
.side-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.side-head .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt-faint);font-weight:600}
.tree{overflow:auto;padding:4px 8px 24px;flex:1}
.dom{margin-bottom:3px}
.dom-head{display:flex;align-items:center;gap:9px;padding:9px 9px;border-radius:8px;cursor:pointer;user-select:none;transition:.12s}
.dom-head:hover{background:var(--panel)}
.dom-head .caret{color:var(--txt-faint);font-size:10px;transition:transform .15s;width:9px;text-align:center}
.dom.collapsed .caret{transform:rotate(-90deg)}
.dom-head .dico{font-size:15px;color:var(--gold);width:18px;text-align:center}
.dom-head .dname{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.02em;flex:1}
.dom-head .dcount{font-size:11px;color:var(--txt-faint);background:#0e1016;border:1px solid var(--line-soft);padding:1px 7px;border-radius:20px}
.dom-actions{display:none;gap:2px;margin-right:1px}
.dom-head:hover .dom-actions{display:flex}
.dom-actions button{border:none;background:transparent;color:var(--txt-faint);width:23px;height:23px;border-radius:6px;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
.dom-actions button:hover{background:var(--panel-2);color:var(--gold-soft)}
.dom-actions button.del:hover{background:rgba(198,42,48,.18);color:var(--blood-glow)}
.col-row.add-list{color:var(--txt-faint)}
.col-row.add-list:hover{color:var(--gold-soft)}
.side-add{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel-2));color:var(--txt-dim);
  width:26px;height:26px;border-radius:7px;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1}
.side-add:hover{border-color:var(--gold);color:var(--gold-soft)}
.glyphrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.glyphrow button{width:34px;height:34px;border:1px solid var(--line);background:#0e1016;border-radius:8px;font-size:16px;color:var(--gold-soft)}
.glyphrow button:hover{border-color:var(--gold)}
.warn-box{font-size:14px;color:var(--txt-dim);line-height:1.6}
.warn-box b{color:var(--txt)}
.warn-strong{margin-top:12px;padding:11px 13px;border-radius:9px;border:1px solid rgba(198,42,48,.4);
  background:rgba(198,42,48,.08);color:var(--blood-glow);font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start}
.warn-strong .wi{font-size:16px;line-height:1.2}
.dom-cols{overflow:hidden;padding:2px 0 6px 8px}
.dom.collapsed .dom-cols{display:none}
.col-row{display:flex;align-items:center;gap:8px;padding:6px 9px 6px 24px;border-radius:7px;cursor:pointer;
  font-size:13.5px;color:var(--txt-dim);transition:.1s;position:relative}
.col-row:hover{background:var(--panel);color:var(--txt)}
.col-row.active{background:linear-gradient(90deg,rgba(227,179,82,.16),rgba(227,179,82,.03));color:var(--gold-soft)}
.col-row.active::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--gold)}
.col-row .cn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-row .cc{font-size:11px;color:var(--txt-faint)}

/* ---------- content ---------- */
.content{overflow:auto;min-height:0;padding:22px 28px 60px}
.welcome{max-width:780px;margin:24px auto 0}
.welcome h1{font-family:var(--font-display);font-weight:900;font-size:34px;margin:0 0 6px;letter-spacing:.02em}
.welcome .sub{color:var(--txt-dim);font-size:15px;line-height:1.6;margin-bottom:26px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.stat{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:12px;padding:16px 14px;text-align:center}
.stat .n{font-family:var(--font-display);font-weight:900;font-size:28px;color:var(--gold-soft);line-height:1}
.stat .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-faint);margin-top:7px}
.welcome .note{font-size:13.5px;color:var(--txt-dim);line-height:1.65;border-left:2px solid var(--gold-deep);padding:4px 0 4px 16px;background:rgba(227,179,82,.04)}

.col-header{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.col-header .titleblock{flex:1;min-width:240px}
.col-header .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:5px}
.col-header h2{font-family:var(--font-display);font-weight:700;font-size:26px;margin:0;letter-spacing:.01em;display:flex;align-items:center;gap:10px}
.col-header h2 .ed{font-size:13px}
.col-header .meta{font-size:13px;color:var(--txt-faint);margin-top:5px}
.col-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.filterbar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.filterbar .searchwrap{max-width:340px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(214px,1fr));gap:11px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:10px;
  padding:12px 13px;cursor:pointer;transition:.13s;position:relative;overflow:hidden;min-height:58px}
.card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow)}
.card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:0;transition:.13s}
.card:hover::after{opacity:.7}
.card .cname{font-weight:600;font-size:14.5px;line-height:1.3;margin-bottom:3px;padding-right:18px}
.card .cdesc{font-size:12px;color:var(--txt-dim);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .ctags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.card .cflds{font-size:11px;color:var(--txt-faint);margin-top:7px;line-height:1.5}
.card .cflds b{color:var(--txt-dim);font-weight:600}
.tag{font-size:10.5px;letter-spacing:.04em;color:var(--gold-soft);background:rgba(227,179,82,.1);
  border:1px solid rgba(227,179,82,.28);border-radius:20px;padding:2px 9px}
.card .del{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:6px;border:none;background:transparent;
  color:var(--txt-faint);font-size:13px;display:none;align-items:center;justify-content:center;line-height:1}
.card:hover .del{display:flex}
.card .del:hover{background:rgba(198,42,48,.18);color:var(--blood-glow)}
.add-card{display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed var(--line);
  background:transparent;color:var(--txt-faint);font-weight:600;font-size:13.5px;min-height:58px;border-radius:10px;transition:.13s}
.add-card:hover{border-color:var(--gold);color:var(--gold-soft);background:rgba(227,179,82,.04)}
.card[draggable="true"]{cursor:grab}
.card.dragging{opacity:.35;border-color:var(--gold);cursor:grabbing}
.col-row.drop-target{background:linear-gradient(90deg,rgba(227,179,82,.24),rgba(227,179,82,.05));box-shadow:inset 0 0 0 1px var(--gold);color:var(--gold-soft)}
.col-row.drop-target .cc{color:var(--gold)}
body.is-dragging .tree{outline:1px dashed rgba(227,179,82,.18);outline-offset:-3px;border-radius:10px}
.col-row.dragging{opacity:.4}
.col-row.reorder-before{box-shadow:inset 0 2px 0 var(--gold)}
.col-row.reorder-after{box-shadow:inset 0 -2px 0 var(--gold)}
.dom-head.dom-drop{background:linear-gradient(90deg,rgba(227,179,82,.22),rgba(227,179,82,.04));box-shadow:inset 0 0 0 1px var(--gold)}
.dom-head.dom-drop .dname{color:var(--gold-soft)}
.card.insert-before{box-shadow:inset 3px 0 0 0 var(--gold)}
.card.insert-after{box-shadow:inset -3px 0 0 0 var(--gold)}
.popover{position:fixed;z-index:75;background:linear-gradient(180deg,#171a23,#111319);border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow);padding:5px;min-width:180px}
.popover button{display:flex;width:100%;align-items:center;gap:10px;background:transparent;border:none;color:var(--txt);
  padding:8px 10px;border-radius:7px;font-size:13px;text-align:left;font-weight:500;cursor:pointer}
.popover button:hover{background:var(--panel-2);color:var(--gold-soft)}
.popover button .pi{width:30px;color:var(--gold);font-weight:700;font-size:12px;text-align:center;flex:none}
.popover .ph{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-faint);padding:7px 10px 4px;font-weight:600}
.popover .sep{height:1px;background:var(--line-soft);margin:4px 4px}
.selbox{position:absolute;top:7px;left:7px;width:20px;height:20px;border-radius:6px;border:1px solid var(--line);
  background:#0e1016;color:transparent;font-size:12px;display:none;align-items:center;justify-content:center;line-height:1;padding:0}
.card:hover .selbox{display:flex}
.card.selected{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
.card{user-select:none;-webkit-user-select:none}
.card.selected::after{opacity:.7}
.card.selected .selbox{display:flex;background:var(--gold);border-color:var(--gold);color:#231a07}
.card .cname{transition:padding .12s}
.card:hover .cname,.card.selected .cname{padding-left:22px}
.selbar{display:none;align-items:center;gap:9px;flex-wrap:wrap;margin:-2px 0 14px;padding:9px 13px;border-radius:9px;
  border:1px solid var(--gold-deep);background:rgba(227,179,82,.07)}
.selbar.on{display:flex}
.selbar .n{font-weight:700;color:var(--gold-soft);font-size:13.5px}
.selbar .hint{font-size:12px;color:var(--txt-faint)}
.selbar .sp{flex:1}

.empty{color:var(--txt-faint);font-size:14px;padding:40px 0;text-align:center}
.search-group{margin-bottom:22px}
.search-group .sg-head{font-family:var(--font-display);font-size:14px;color:var(--gold);letter-spacing:.04em;
  margin:0 0 9px;display:flex;align-items:center;gap:8px}
.search-group .sg-head .dom-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-faint);font-family:var(--font-ui)}

/* ---------- drawer ---------- */
.backdrop{position:fixed;inset:0;background:rgba(6,7,11,.62);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:.18s}
.backdrop.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,94vw);background:linear-gradient(180deg,#15171f,#101218);
  border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(0,0,0,.5);z-index:50;
  transform:translateX(102%);transition:transform .22s cubic-bezier(.4,.0,.2,1);display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.drawer-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
.drawer-head .dh-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:5px}
.drawer-head h3{font-family:var(--font-display);font-weight:700;font-size:19px;margin:0;flex:1}
.drawer-close{background:transparent;border:1px solid var(--line);border-radius:8px;width:32px;height:32px;color:var(--txt-dim);font-size:15px}
.drawer-close:hover{border-color:var(--blood);color:var(--blood-glow)}
.drawer-body{padding:18px 20px;overflow:auto;flex:1}
.drawer-body .row{margin-bottom:16px}
.fields-list{display:flex;flex-direction:column;gap:8px}
.field-row{display:grid;grid-template-columns:1fr 1.4fr auto;gap:7px;align-items:center}
.field-row .x{border:1px solid var(--line);background:transparent;color:var(--txt-faint);border-radius:7px;width:32px;height:36px;font-size:14px}
.field-row .x:hover{border-color:var(--blood);color:var(--blood-glow)}
.addfield{margin-top:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.chip-x{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gold-soft);background:rgba(227,179,82,.1);
  border:1px solid rgba(227,179,82,.28);border-radius:20px;padding:3px 5px 3px 11px}
.chip-x button{border:none;background:transparent;color:var(--gold-soft);font-size:13px;line-height:1;padding:0 2px}
.chip-x button:hover{color:var(--blood-glow)}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60}
.modal.on{display:flex}
.modal .box{background:linear-gradient(180deg,#171a23,#111319);border:1px solid var(--line);border-radius:14px;
  width:min(440px,92vw);box-shadow:var(--shadow);overflow:hidden}
.modal .box h3{font-family:var(--font-display);margin:0;padding:18px 20px 4px;font-size:18px;font-weight:700}
.modal .box .mb{padding:8px 20px 18px}
.modal .box .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:linear-gradient(180deg,#1d2029,#15171e);border:1px solid var(--gold-deep);color:var(--gold-soft);
  padding:11px 20px;border-radius:10px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.hide{display:none!important}
@media(max-width:860px){
  .main{grid-template-columns:1fr}
  .sidebar{position:fixed;top:57px;left:0;bottom:0;width:280px;z-index:25;transform:translateX(-102%);transition:.2s}
  .sidebar.on{transform:translateX(0)}
  .statgrid{grid-template-columns:repeat(2,1fr)}
}
.menu-toggle{display:none}
@media(max-width:860px){.menu-toggle{display:inline-flex}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="btn icon menu-toggle" id="menuToggle" title="Menu">&#9776;</button>
    <div class="brand" id="homeBtn" title="Home">
      <span class="eyebrow">Game Master&rsquo;s Compendium</span>
      <span class="name">The Codex</span>
    </div>
    <div class="searchwrap">
      <span class="ico">&#128269;</span>
      <input class="inp" id="globalSearch" placeholder="Search every entry&hellip;" autocomplete="off">
      <span class="kbd">Ctrl K</span>
    </div>
    <div class="spacer"></div>
    <div class="toolbtns">
      <button class="btn sm" id="newColBtn">&#10010; Collection</button>
      <button class="btn sm" id="importBtn">Import</button>
      <button class="btn sm" id="exportBtn">Export</button>
      <button class="btn sm" id="publishBtn" style="display:none" title="Send a snapshot of this library to your linked campaign — players receive it automatically">⇪ Publish to Campaign</button>
      <button class="btn sm danger" id="resetBtn" title="Restore the original library">Restore</button>
    </div>
  </div>
  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <span class="lbl">Library</span>
        <div style="display:flex;align-items:center;gap:9px">
          <span class="lbl" id="sideCount"></span>
          <button class="btn sm" id="toggleAllBtn" title="Expand or collapse all categories">Expand All</button>
          <button class="side-add" id="newDomainBtn" title="Add a category">&#10010;</button>
        </div>
      </div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="content" id="content"></section>
  </div>
</div>

<!-- entry drawer -->
<div class="backdrop" id="backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div style="flex:1">
      <div class="dh-eyebrow" id="drawerEyebrow">Entry</div>
      <h3 id="drawerTitle">Edit</h3>
    </div>
    <button class="drawer-close" id="drawerClose">&#10005;</button>
  </div>
  <div class="drawer-body">
    <div class="row"><label class="fld">Name</label><input class="inp" id="eName"></div>
    <div class="row"><label class="fld">Description</label><textarea class="inp" id="eDesc" placeholder="A short description, statblock summary, lore&hellip;"></textarea></div>
    <div class="row">
      <label class="fld">Details &amp; Stats</label>
      <div class="fields-list" id="eFields"></div>

<script>
/* ============================ state ============================ */
const SEED = JSON.parse(document.getElementById('seedData').textContent);
const LS_KEY = 'codex_db_v1';
/* ---- IndexedDB: quota-based storage \u2014 replaces the 5 MB localStorage ceiling ---- */
const _IDB_DB='the-table-codex', _IDB_ST='data', _IDB_REC=LS_KEY;
function _idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(_IDB_DB,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB_ST);r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej();});}
async function _idbGet(){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const r=idb.transaction(_IDB_ST).objectStore(_IDB_ST).get(_IDB_REC);r.onsuccess=e=>res(e.target.result||null);r.onerror=()=>rej();});}catch(e){return null;}}
async function _idbPut(val){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const tx=idb.transaction(_IDB_ST,'readwrite');tx.objectStore(_IDB_ST).put(val,_IDB_REC);tx.oncomplete=()=>res();tx.onerror=()=>rej();});}catch(e){}}

let db = structuredClone(SEED); /* placeholder \u2014 overwritten by async init at the bottom */
const ui = { active:null, search:'', filter:'', collapsed:new Set(), editing:null, draft:null, selected:new Set(), lastSel:null };

function save(){ _idbPut(db).catch(()=>toast('Save failed \u2014 export a backup')); }
function uid(p){ return (p||'x')+'_'+Math.random().toString(36).slice(2,9); }
/* Ensures every collection and entry has a unique id and a well-formed shape.
   Runs on load and after every import so cards always open when clicked. Returns the number of fixes made. */
function normalizeDb(){
  if(!db || typeof db!=='object') return 0;
  let fixed=0;
  db.collections = Array.isArray(db.collections) ? db.collections : [];
  db.domainOrder = Array.isArray(db.domainOrder) ? db.domainOrder : [];
  const seenCol=new Set();
  db.collections.forEach(c=>{
    if(!c.id || seenCol.has(c.id)){ c.id=uid('col'); fixed++; }
    seenCol.add(c.id);
    c.entries = Array.isArray(c.entries) ? c.entries : [];
    const seenE=new Set();
    c.entries.forEach(e=>{
      if(!e.id || seenE.has(e.id)){ e.id=uid('e'); fixed++; }
      seenE.add(e.id);
      if(e.name==null) e.name='';
      if(e.desc==null) e.desc='';
      if(!e.fields || typeof e.fields!=='object') e.fields={};
      if(!Array.isArray(e.tags)) e.tags=[];
      if(e.notes==null) e.notes='';
    });
    if(c.domain && !db.domainOrder.includes(c.domain)){ db.domainOrder.push(c.domain); fixed++; }
  });
  return fixed;
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function domainsOrdered(){
  const present = [...new Set(db.collections.map(c=>c.domain))];
  const ord = [...(db.domainOrder||[])];
  present.forEach(d=>{ if(!ord.includes(d)) ord.push(d); });
  return ord;
}
const domIcon = d => (db.domainIcons&&db.domainIcons[d]) || '\u2756';
const getCol = id => db.collections.find(c=>c.id===id);
const colsIn = d => db.collections.filter(c=>c.domain===d);

/* ============================ render ============================ */
function render(){ renderSidebar(); renderContent(); }

function renderSidebar(){
  const tree = document.getElementById('tree');
  const q = ui.search.trim().toLowerCase();
  let html='';
  domainsOrdered().forEach(d=>{
    let cs = colsIn(d);
    if(q) cs = cs.filter(c=>c.name.toLowerCase().includes(q));
    if(q && !cs.length) return;
    const collapsed = ui.collapsed.has(d) && !q;
    const tot = colsIn(d).reduce((a,c)=>a+c.entries.length,0);
    html += `<div class="dom ${collapsed?'collapsed':''}" data-dom="${esc(d)}">
      <div class="dom-head" data-domtoggle="${esc(d)}">
        <span class="caret">&#9660;</span>
        <span class="dico">${domIcon(d)}</span>
        <span class="dname">${esc(d)}</span>
        <span class="dom-actions">
          <button data-domsort="${esc(d)}" title="Sort lists">&#8693;</button>
          <button data-domedit="${esc(d)}" title="Edit category">&#9998;</button>
          <button class="del" data-domdel="${esc(d)}" title="Delete category">&#10005;</button>
        </span>
        <span class="dcount">${tot}</span>
      </div>
      <div class="dom-cols">`;
    cs.forEach(c=>{
      html += `<div class="col-row ${ui.active===c.id?'active':''}" draggable="true" data-col="${c.id}">
        <span class="cn">${esc(c.name)}</span><span class="cc">${c.entries.length}</span></div>`;
    });
    if(!cs.length && !q) html += `<div class="col-row add-list" data-addcoldom="${esc(d)}"><span class="cn">&#10010; Add a list</span></div>`;
    html += `</div></div>`;
  });
  tree.innerHTML = html || `<div class="empty">No matches</div>`;
  document.getElementById('sideCount').textContent = db.collections.length+' lists';
  const tab = document.getElementById('toggleAllBtn');
  if(tab){ const allCollapsed = domainsOrdered().every(d=>ui.collapsed.has(d));
    tab.textContent = allCollapsed?'Expand All':'Collapse All'; }
}
function toggleAllDomains(){
  const domains = domainsOrdered();
  const allCollapsed = domains.every(d=>ui.collapsed.has(d));
  if(allCollapsed){ ui.collapsed.clear(); } else { domains.forEach(d=>ui.collapsed.add(d)); }
  renderSidebar();
}

function renderContent(){
  const el = document.getElementById('content');
  if(ui.search.trim()){ el.innerHTML = renderSearch(); bindCards(); applySel(); return; }
  if(!ui.active || !getCol(ui.active)){ el.innerHTML = renderWelcome(); return; }
  const c = getCol(ui.active);
  const f = ui.filter.trim().toLowerCase();
  let entries = c.entries;
  if(f) entries = entries.filter(e=>entryMatches(e,f));
  let cards = entries.map(e=>cardHTML(c,e)).join('');
  cards += `<button class="add-card" data-add="${c.id}">&#10010; Add entry</button>`;
  el.innerHTML = `
    <div class="col-header">
      <div class="titleblock">
        <div class="chip">${domIcon(c.domain)} ${esc(c.domain)}</div>
        <h2>${esc(c.name)} <button class="btn sm icon ed" data-rename="${c.id}" title="Rename / move">&#9998;</button></h2>
        <div class="meta">${c.entries.length} ${c.entries.length===1?'entry':'entries'}${f?` \u00b7 ${entries.length} shown`:''}</div>
      </div>
      <div class="col-actions">
        <button class="btn sm" data-draw="${c.id}">&#9856; Draw random</button>
        <button class="btn sm" data-organize="${c.id}">&#8693; Organize</button>
        <button class="btn sm" data-add="${c.id}">&#10010; Add entry</button>
        <button class="btn sm danger" data-delcol="${c.id}">Delete list</button>
      </div>
    </div>
    <div class="filterbar">
      <div class="searchwrap"><span class="ico">&#128269;</span>
        <input class="inp" id="entryFilter" placeholder="Filter ${esc(c.name)}&hellip;" value="${esc(ui.filter)}"></div>
    </div>
    <div class="selbar" id="selBar"></div>
    <div class="cards" id="cards">${cards}</div>`;
  const fi = document.getElementById('entryFilter');
  fi.addEventListener('input',()=>{ ui.filter=fi.value; const cards=document.getElementById('cards');
    const ff=ui.filter.trim().toLowerCase();
    let es=c.entries; if(ff) es=es.filter(e=>entryMatches(e,ff));
    cards.innerHTML = es.map(e=>cardHTML(c,e)).join('') + `<button class="add-card" data-add="${c.id}">&#10010; Add entry</button>`;
    document.querySelector('.col-header .meta').textContent = `${c.entries.length} entries${ff?` \u00b7 ${es.length} shown`:''}`;
    bindCards();
  });
  bindCards();
  applySel();
}
// fix typo guard (entر) -> render uses safe text below
function entryMatches(e,f){
  if(e.name.toLowerCase().includes(f)) return true;
  if((e.desc||'').toLowerCase().includes(f)) return true;
  if((e.tags||[]).some(t=>t.toLowerCase().includes(f))) return true;
  if(Object.values(e.fields||{}).some(v=>String(v).toLowerCase().includes(f))) return true;
  return false;
}
function cardHTML(c,e){
  const tags = (e.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const flds = Object.entries(e.fields||{}).slice(0,3)
    .map(([k,v])=>`<div><b>${esc(k)}:</b> ${esc(v)}</div>`).join('');
  return `<div class="card" draggable="true" data-entry="${e.id}" data-col="${c.id}" title="Click to edit \u00b7 check or \u2318/Ctrl-click to select \u00b7 drag onto a list to move">
    <button class="selbox" data-selbox title="Select" draggable="false">&#10003;</button>
    <button class="del" data-delentry="${e.id}" data-col="${c.id}" title="Delete" draggable="false">&#10005;</button>
    <div class="cname">${esc(e.name)}</div>
    ${e.desc?`<div class="cdesc">${esc(e.desc)}</div>`:''}
    ${flds?`<div class="cflds">${flds}</div>`:''}
    ${tags?`<div class="ctags">${tags}</div>`:''}
  </div>`;
}
function renderWelcome(){
  const nCol=db.collections.length, nEnt=db.collections.reduce((a,c)=>a+c.entries.length,0), nDom=domainsOrdered().length;
  return `<div class="welcome">
    <h1>Your World&rsquo;s Codex</h1>
    <div class="sub">A living library for everything in your game &mdash; heritages, names, gear, magic, spells, deities, books and more.
      Browse a list on the left, then <b>add, edit, tag, and annotate</b> any entry. Everything saves to this browser automatically;
      use <b>Export</b> to back up or move between machines.</div>
    <div class="statgrid">
      <div class="stat"><div class="n">${nEnt.toLocaleString()}</div><div class="l">Entries</div></div>
      <div class="stat"><div class="n">${nCol}</div><div class="l">Lists</div></div>
      <div class="stat"><div class="n">${nDom}</div><div class="l">Domains</div></div>
      <div class="stat"><div class="n">&#9856;</div><div class="l">Generator-ready</div></div>
    </div>

      and tag them so a future <b>generator</b> &mdash; or your Initiative Tracker and Character Sheets &mdash; can pull from the same source of truth.
      Pick a list on the left to begin.</div>
  </div>`;
}
function renderSearch(){
  const q = ui.search.trim().toLowerCase();
  let groups=[], count=0;
  for(const c of db.collections){
    const hits = c.entries.filter(e=>entryMatches(e,q));
    if(hits.length){ groups.push({c,hits}); count+=hits.length; }
    if(count>400) break;
  }
  if(!groups.length) return `<div class="empty">Nothing matches &ldquo;${esc(ui.search)}&rdquo;</div>`;
  let html = `<div class="col-header"><div class="titleblock"><div class="chip">&#128269; Search</div>
    <h2>Results for &ldquo;${esc(ui.search)}&rdquo;</h2><div class="meta">${count} match${count===1?'':'es'} across ${groups.length} list${groups.length===1?'':'s'}</div></div></div>
    <div class="selbar" id="selBar"></div>`;
  for(const g of groups.slice(0,60)){
    html += `<div class="search-group"><div class="sg-head">${domIcon(g.c.domain)} ${esc(g.c.name)}
      <span class="dom-tag">${esc(g.c.domain)} \u00b7 ${g.hits.length}</span></div>
      <div class="cards">${g.hits.slice(0,40).map(e=>cardHTML(g.c,e)).join('')}</div></div>`;
  }
  return html;
}

function bindCards(){

function toggleSel(colId,entryId){ const k=selKey(colId,entryId); ui.selected.has(k)?ui.selected.delete(k):ui.selected.add(k); }

function rangeSelectTo(card){

/* ---------- drag & drop: move entries, reorder entries, reorder lists ---------- */
let dragPayload=null;   // [{colId,entryId}] when dragging entries
let dragColId=null;     // collection id when dragging a list row
let dropRow=null;       // col-row highlighted as an entry move target
let reorderRow=null;    // col-row showing a list-reorder indicator
let insertCard=null;    // card showing an entry-insert indicator
let domTarget=null;     // element highlighted as a "move list into this category" target
let crossTarget=null;   // {domain, refId, after} when dragging a list into another category
const _content=document.getElementById('content');
const _tree=document.getElementById('tree');
function clearAllDnD(){
  if(dropRow){ dropRow.classList.remove('drop-target'); dropRow=null; }
  if(reorderRow){ reorderRow.classList.remove('reorder-before','reorder-after'); reorderRow=null; }
  if(insertCard){ insertCard.classList.remove('insert-before','insert-after'); insertCard=null; }
  if(domTarget){ domTarget.classList.remove('dom-drop'); domTarget=null; }
  crossTarget=null;
  document.body.classList.remove('is-dragging'); dragPayload=null; dragColId=null;
}

/* --- entries: start dragging from a card --- */
_content.addEventListener('dragstart',e=>{
  const card=e.target.closest('.card[data-entry]'); if(!card) return;
  if(e.target.closest('[data-selbox]')){ e.preventDefault(); return; }
  const key=selKey(card.dataset.col,card.dataset.entry);
  const items = ui.selected.has(key) ? selectedItems() : [{colId:card.dataset.col, entryId:card.dataset.entry}];
  dragPayload=items; dragColId=null;
  try{ e.dataTransfer.setData('text/plain', JSON.stringify(items)); e.dataTransfer.effectAllowed='move'; }catch(_){}
  document.body.classList.add('is-dragging');
  const keys=new Set(items.map(it=>selKey(it.colId,it.entryId)));
  document.querySelectorAll('.card[data-entry]').forEach(cd=>{ if(keys.has(selKey(cd.dataset.col,cd.dataset.entry))) cd.classList.add('dragging'); });
});
_content.addEventListener('dragend',()=>{ document.querySelectorAll('.card.dragging').forEach(c=>c.classList.remove('dragging')); clearAllDnD(); });

/* --- entries: reorder within the current list by dropping in the cards area --- */
function entryInsertPoint(wrap, x, y){
  const cards=[...wrap.querySelectorAll('.card[data-entry]:not(.dragging)')];
  for(const card of cards){
    const r=card.getBoundingClientRect();
    if(y < r.top) return {refCard:card, after:false};
    if(y <= r.bottom && x < r.left + r.width/2) return {refCard:card, after:false};
  }
  return cards.length ? {refCard:cards[cards.length-1], after:true} : {refCard:null, after:true};
}
_content.addEventListener('dragover',e=>{
  if(!dragPayload || ui.search.trim()) return;
  const wrap=document.getElementById('cards'); if(!wrap) return;
  if(!wrap.contains(e.target) && e.target!==wrap){ if(insertCard){insertCard.classList.remove('insert-before','insert-after');insertCard=null;} return; }
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  const {refCard,after}=entryInsertPoint(wrap,e.clientX,e.clientY);
  if(insertCard && insertCard!==refCard) insertCard.classList.remove('insert-before','insert-after');
  if(refCard){ refCard.classList.remove('insert-before','insert-after'); refCard.classList.add(after?'insert-after':'insert-before'); insertCard=refCard; }
  else insertCard=null;
});
_content.addEventListener('drop',e=>{
  if(!dragPayload || ui.search.trim()) return;
  const wrap=document.getElementById('cards'); if(!wrap) return;
  if(!wrap.contains(e.target) && e.target!==wrap) return;
  e.preventDefault();
  const {refCard,after}=entryInsertPoint(wrap,e.clientX,e.clientY);
  const refId=refCard?refCard.dataset.entry:null;
  const ids=dragPayload.filter(it=>it.colId===ui.active).map(it=>it.entryId);
  clearAllDnD();
  if(ids.length) reorderEntries(ids, refId, after);
});
function reorderEntries(movingIds, refId, after){
  const c=getCol(ui.active); if(!c) return;
  if(refId && movingIds.includes(refId)) return;
  const moving=c.entries.filter(x=>movingIds.includes(x.id)); if(!moving.length) return;
  const rest=c.entries.filter(x=>!movingIds.includes(x.id));
  let idx;
  if(refId==null) idx=rest.length;
  else { idx=rest.findIndex(x=>x.id===refId); if(idx<0) idx=rest.length; else if(after) idx+=1; }
  rest.splice(idx,0,...moving);
  c.entries=rest; clearSelection(); save(); render();
}

/* --- lists: start dragging a sidebar row --- */
_tree.addEventListener('dragstart',e=>{
  const row=e.target.closest('.col-row[data-col]'); if(!row) return;
  dragColId=row.dataset.col; dragPayload=null;
  try{ e.dataTransfer.setData('text/plain','col:'+dragColId); e.dataTransfer.effectAllowed='move'; }catch(_){}
  document.body.classList.add('is-dragging'); row.classList.add('dragging');
});
_tree.addEventListener('dragend',()=>{ document.querySelectorAll('.col-row.dragging').forEach(r=>r.classList.remove('dragging')); clearAllDnD(); });
_tree.addEventListener('dragover',e=>{
  const row=e.target.closest('.col-row[data-col]');
  if(dragColId){
    const a=getCol(dragColId); if(!a) return;
    // Hovering a list row
    if(row && row.dataset.col!==dragColId){
      const b=getCol(row.dataset.col); if(!b) return;
      const r=row.getBoundingClientRect(); const after=e.clientY > r.top+r.height/2;
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      if(reorderRow && reorderRow!==row) reorderRow.classList.remove('reorder-before','reorder-after');
      row.classList.remove('reorder-before','reorder-after'); row.classList.add(after?'reorder-after':'reorder-before'); reorderRow=row;
      if(domTarget){ domTarget.classList.remove('dom-drop'); domTarget=null; }
      // same category -> reorder; different category -> move into that category near this row
      crossTarget = (a.domain===b.domain) ? null : {domain:b.domain, refId:row.dataset.col, after};
      return;
    }
    // Hovering a category header -> move list into that category
    const head=e.target.closest('.dom-head[data-domtoggle]');
    if(head){
      const dname=head.dataset.domtoggle;
      if(a.domain!==dname){
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        if(reorderRow){ reorderRow.classList.remove('reorder-before','reorder-after'); reorderRow=null; }
        if(domTarget && domTarget!==head) domTarget.classList.remove('dom-drop');
        head.classList.add('dom-drop'); domTarget=head;
        crossTarget={domain:dname, refId:null, after:false};
      }
      return;
    }
    return;
  }
  if(dragPayload){
    if(!row) return; e.preventDefault();
    const allSame=dragPayload.every(it=>it.colId===row.dataset.col);
    e.dataTransfer.dropEffect = allSame?'none':'move';
    if(row!==dropRow){ if(dropRow) dropRow.classList.remove('drop-target');
      if(!allSame){ row.classList.add('drop-target'); dropRow=row; } else dropRow=null; }
  }
});
_tree.addEventListener('dragleave',e=>{ if(!e.relatedTarget || !_tree.contains(e.relatedTarget)){
  if(dropRow){dropRow.classList.remove('drop-target');dropRow=null;}
  if(reorderRow){reorderRow.classList.remove('reorder-before','reorder-after');reorderRow=null;}
}});
_tree.addEventListener('dragleave',e=>{ if(!e.relatedTarget || !_tree.contains(e.relatedTarget)){
  if(dropRow){dropRow.classList.remove('drop-target');dropRow=null;}
  if(reorderRow){reorderRow.classList.remove('reorder-before','reorder-after');reorderRow=null;}
  if(domTarget){domTarget.classList.remove('dom-drop');domTarget=null;}
}});
_tree.addEventListener('drop',e=>{
  const row=e.target.closest('.col-row[data-col]');
  if(dragColId){ e.preventDefault();
    const ct=crossTarget;
    if(ct){ moveCollectionToDomain(dragColId, ct.domain, ct.refId, ct.after); }
    else if(row && row.dataset.col!==dragColId){
      const r=row.getBoundingClientRect(); const after=e.clientY > r.top+r.height/2;
      reorderCollection(dragColId, row.dataset.col, after);
    }
    clearAllDnD(); return;
  }
  if(dragPayload){ e.preventDefault();
    const dest=row&&row.dataset.col; const items=dragPayload; clearAllDnD();
    if(dest) moveEntries(items, dest);
  }
});
function moveCollectionToDomain(dragId, targetDomain, refId, after){
  const a=getCol(dragId); if(!a) return;
  a.domain=targetDomain;
  if(!(db.domainOrder||[]).includes(targetDomain)) (db.domainOrder=db.domainOrder||[]).push(targetDomain);
  const arr=db.collections;
  const di=arr.findIndex(c=>c.id===dragId); if(di>=0) arr.splice(di,1);
  if(refId){
    let ri=arr.findIndex(c=>c.id===refId);
    if(ri<0) arr.push(a); else { if(after) ri+=1; arr.splice(ri,0,a); }
  } else {
    let lastIdx=-1; arr.forEach((c,i)=>{ if(c.domain===targetDomain) lastIdx=i; });
    if(lastIdx<0) arr.push(a); else arr.splice(lastIdx+1,0,a);
  }
  ui.collapsed.delete(targetDomain);
  save(); render(); toast(`Moved \u201c${a.name}\u201d \u2192 ${targetDomain}`);
}
function reorderCollection(dragId, refId, after){
  const a=getCol(dragId), b=getCol(refId);
  if(!a||!b||a.domain!==b.domain||dragId===refId) return;
  const arr=db.collections;
  const di=arr.findIndex(c=>c.id===dragId); if(di<0) return; arr.splice(di,1);
  let ri=arr.findIndex(c=>c.id===refId); if(ri<0){ arr.push(a); } else { if(after) ri+=1; arr.splice(ri,0,a); }
  save(); render();
}
function moveEntries(items, destId){
  const dest=getCol(destId); if(!dest) return;
  let moved=0, lastName='';
  items.forEach(({colId,entryId})=>{
    if(colId===destId) return;
    const src=getCol(colId); if(!src) return;
    const idx=src.entries.findIndex(x=>x.id===entryId); if(idx<0) return;
    const [e]=src.entries.splice(idx,1);
    dest.entries.push(e); moved++; lastName=e.name;
  });
  if(!moved){ toast('Already in that list'); return; }
  clearSelection(); save(); render();
  toast(moved===1?`Moved \u201c${lastName}\u201d \u2192 ${dest.name}`:`Moved ${moved} entries \u2192 ${dest.name}`);
}

/* ---------- organize / sort popover ---------- */
let _popover=null;
function closePopover(){ if(_popover){ _popover.remove(); _popover=null; document.removeEventListener('mousedown',_popOutside,true); } }
function _popOutside(e){ if(_popover && !_popover.contains(e.target)) closePopover(); }
function openPopover(anchor, items){
  closePopover();
  const p=document.createElement('div'); p.className='popover';
  items.forEach(it=>{
    if(it.header){ const h=document.createElement('div'); h.className='ph'; h.textContent=it.header; p.appendChild(h); return; }
    if(it.sep){ const s=document.createElement('div'); s.className='sep'; p.appendChild(s); return; }
    const b=document.createElement('button');
    b.innerHTML=`<span class="pi">${it.icon||''}</span><span>${esc(it.label)}</span>`;
    b.onclick=()=>{ closePopover(); it.fn(); };
    p.appendChild(b);
  });
  document.body.appendChild(p);
  const r=anchor.getBoundingClientRect();
  let left=r.left, top=r.bottom+6;
  if(left+p.offsetWidth>window.innerWidth-8) left=window.innerWidth-p.offsetWidth-8;
  if(top+p.offsetHeight>window.innerHeight-8) top=r.top-p.offsetHeight-6;
  p.style.left=Math.max(8,left)+'px'; p.style.top=Math.max(8,top)+'px';
  setTimeout(()=>document.addEventListener('mousedown',_popOutside,true),0);
  _popover=p;
}
const _cmp=(x,y)=>x.localeCompare(y,undefined,{numeric:true,sensitivity:'base'});
function openEntryOrganize(colId, anchor){
  const c=getCol(colId); if(!c) return;
  openPopover(anchor,[
    {header:'Sort entries'},
    {icon:'A\u2192Z', label:'Name A \u2013 Z', fn:()=>sortEntries(c,'az')},
    {icon:'Z\u2192A', label:'Name Z \u2013 A', fn:()=>sortEntries(c,'za')},
    {icon:'\u21C5', label:'Reverse order', fn:()=>sortEntries(c,'rev')},
    {sep:true},
    {icon:'\u2682', label:'Shuffle', fn:()=>sortEntries(c,'shuffle')},
  ]);
}
function sortEntries(c,mode){
  if(mode==='az') c.entries.sort((a,b)=>_cmp(a.name,b.name));
  else if(mode==='za') c.entries.sort((a,b)=>_cmp(b.name,a.name));
  else if(mode==='rev') c.entries.reverse();
  else if(mode==='shuffle'){ for(let i=c.entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [c.entries[i],c.entries[j]]=[c.entries[j],c.entries[i]]; } }
  save(); render(); toast('Entries organized');
}
function openDomainSort(domain, anchor){
  openPopover(anchor,[
    {header:'Sort lists in '+domain},
    {icon:'A\u2192Z', label:'Name A \u2013 Z', fn:()=>sortDomainLists(domain,'az')},
    {icon:'Z\u2192A', label:'Name Z \u2013 A', fn:()=>sortDomainLists(domain,'za')},
    {icon:'\u21C5', label:'Reverse order', fn:()=>sortDomainLists(domain,'rev')},
  ]);
}
function sortDomainLists(domain,mode){
  const inDom=db.collections.filter(c=>c.domain===domain);
  if(mode==='az') inDom.sort((a,b)=>_cmp(a.name,b.name));
  else if(mode==='za') inDom.sort((a,b)=>_cmp(b.name,a.name));
  else if(mode==='rev') inDom.reverse();
  const result=[];
  domainsOrdered().forEach(d=>{ if(d===domain) result.push(...inDom); else result.push(...db.collections.filter(c=>c.domain===d)); });
  db.collections=result; save(); render(); toast('Lists organized');
}

/* ============================ entry editor ============================ */
function openEntry(colId, entryId){

function newEntry(colId){

function renderFields(){
  const wrap=document.getElementById('eFields');

  wrap.innerHTML = ents.map(([k,v],i)=>`<div class="field-row">
    <input class="inp" data-fk="${i}" placeholder="Label" value="${esc(k)}">
    <input class="inp" data-fv="${i}" placeholder="Value" value="${esc(v)}">
    <button class="x" data-fx="${i}">&#10005;</button></div>`).join('') || '';
  wrap.querySelectorAll('[data-fx]').forEach(b=>b.addEventListener('click',()=>{
    const k=ents[+b.dataset.fx][0]; delete ui.draft.fields[k]; renderFields();
  }));
  const commit=()=>{ const obj={}; ents.forEach(([ok],i)=>{
      const k=wrap.querySelector(`[data-fk="${i}"]`).value.trim();

document.getElementById('addFieldBtn').addEventListener('click',()=>{

function renderTags(){
  const wrap=document.getElementById('eTags');
  wrap.innerHTML = ui.draft.tags.map((t,i)=>`<span class="chip-x">${esc(t)}<button data-tx="${i}">&#10005;</button></span>`).join('');
  wrap.querySelectorAll('[data-tx]').forEach(b=>b.addEventListener('click',()=>{ ui.draft.tags.splice(+b.dataset.tx,1); renderTags(); }));
}
document.getElementById('eTagInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===','){ e.preventDefault(); const v=e.target.value.trim().replace(/,$/,'');
    if(v && !ui.draft.tags.includes(v)){ ui.draft.tags.push(v); renderTags(); } e.target.value=''; }
});
document.getElementById('saveEntryBtn').addEventListener('click',saveEntry);
function saveEntry(){
  // commit field edits from DOM
  const wrap=document.getElementById('eFields'); const obj={};
  wrap.querySelectorAll('.field-row').forEach(row=>{
    const k=row.querySelector('[data-fk]').value.trim(); const v=row.querySelector('[data-fv]').value;
    if(k) obj[k]=v; });
  ui.draft.fields=obj;
  ui.draft.name=document.getElementById('eName').value.trim();
  ui.draft.desc=document.getElementById('eDesc').value;
  ui.draft.notes=document.getElementById('eNotes').value;
  const targetCol=document.getElementById('eCollection').value;
  if(!ui.draft.name){ toast('Give it a name first'); return; }
  const src=getCol(ui.editing.colId);
  if(ui.editing.isNew){
    getCol(targetCol).entries.push({id:uid('e'),name:ui.draft.name,desc:ui.draft.desc,fields:ui.draft.fields,tags:ui.draft.tags,notes:ui.draft.notes});
  }else{
    const e=src.entries.find(x=>x.id===ui.editing.entryId);
    Object.assign(e,{name:ui.draft.name,desc:ui.draft.desc,fields:ui.draft.fields,tags:ui.draft.tags,notes:ui.draft.notes});
    if(targetCol!==ui.editing.colId){ // move
      src.entries=src.entries.filter(x=>x.id!==e.id); getCol(targetCol).entries.push(e);
    }
  }
  ui.active=targetCol; save(); closeDrawer(); render(); toast('Saved');
}
document.getElementById('deleteEntryBtn').addEventListener('click',()=>{
  if(!ui.editing||ui.editing.isNew) return;
  deleteEntry(ui.editing.colId,ui.editing.entryId,true); closeDrawer();
});
function deleteEntry(colId,entryId,silent){
  const c=getCol(colId); const e=c.entries.find(x=>x.id===entryId); if(!e) return;
  if(!silent && !confirm(`Delete \u201c${e.name}\u201d?`)) return;
  c.entries=c.entries.filter(x=>x.id!==entryId); ui.selected.delete(selKey(colId,entryId)); save(); render(); toast('Deleted');
}

const GLYPHS = ['\u2698','\u270d','\u2692','\u2727','\u2728','\u269c','\u2756','\u2696','\u2620','\u2694','\u269b','\u2693','\u2691','\u2622','\u26b1','\u2604','\u2605','\u273f','\u2660','\u2663','\u{1F409}','\u{1F5FA}','\u{1F4DC}','\u{1F3F0}','\u{1F4B0}','\u{1F377}','\u{1F9EA}','\u{1F5E1}'];

}

/* ---------- domain (category) management ---------- */
function addDomain(){
  modal('New category', `
    <label class="fld">Category name</label><input class="inp" id="mDName" placeholder="e.g. Encounters">
    <div style="height:12px"></div>
    <label class="fld">Icon</label><input class="inp" id="mDIcon" value="\u2756" maxlength="4">
    ${glyphPicker('mDIcon')}`,
    [{label:'Create',cls:'gold',fn:()=>{
      const nm=document.getElementById('mDName').value.trim();
      const ic=document.getElementById('mDIcon').value.trim()||'\u2756';
      if(!nm){ toast('Name the category'); return; }
      if(domainsOrdered().some(d=>d.toLowerCase()===nm.toLowerCase())){ toast('That category already exists'); return; }
      (db.domainOrder=db.domainOrder||[]).push(nm);
      (db.domainIcons=db.domainIcons||{})[nm]=ic;
      ui.collapsed.delete(nm); save(); closeModal(); render(); toast('Category added');
    }}]);
  bindGlyphs();
}
document.getElementById('newDomainBtn').addEventListener('click',addDomain);
document.getElementById('toggleAllBtn').addEventListener('click',toggleAllDomains);

function editDomain(d){
  modal('Edit category', `
    <label class="fld">Category name</label><input class="inp" id="mDName" value="${esc(d)}">
    <div style="height:12px"></div>
    <label class="fld">Icon</label><input class="inp" id="mDIcon" value="${esc(domIcon(d))}" maxlength="4">
    ${glyphPicker('mDIcon')}
    <div style="font-size:12px;color:var(--txt-faint);margin-top:10px">Renaming updates every list inside this category.</div>`,
    [{label:'Save',cls:'gold',fn:()=>{
      const nm=document.getElementById('mDName').value.trim()||d;
      const ic=document.getElementById('mDIcon').value.trim()||domIcon(d);
      const order=db.domainOrder=db.domainOrder||[];
      const oldIdx=order.indexOf(d);
      db.collections.forEach(c=>{ if(c.domain===d) c.domain=nm; });
      if(nm!==d){
        if(oldIdx>=0) order.splice(oldIdx,1);
        if(!order.includes(nm)){ if(oldIdx>=0) order.splice(oldIdx,0,nm); else order.push(nm); }
        if(db.domainIcons) delete db.domainIcons[d];
        if(ui.collapsed.has(d)){ ui.collapsed.delete(d); ui.collapsed.add(nm); }
      }
      db.domainIcons=db.domainIcons||{}; db.domainIcons[nm]=ic;
      save(); closeModal(); render(); toast('Category updated');
    }}]);
  bindGlyphs();
}

function deleteDomain(d){
  const cs=colsIn(d);
  const nEnt=cs.reduce((a,c)=>a+c.entries.length,0);
  const detail = cs.length
    ? `Deleting <b>${esc(d)}</b> will permanently remove its <b>${cs.length}</b> list${cs.length===1?'':'s'} and all <b>${nEnt}</b> entr${nEnt===1?'y':'ies'} inside.`
    : `Delete the empty category <b>${esc(d)}</b>?`;
  modal('Delete category?', `
    <div class="warn-box">${detail}</div>
    ${cs.length?`<div class="warn-strong"><span class="wi">&#9888;</span>
      <span>This can&rsquo;t be undone. If you might want this content back, click Cancel and use <b>Export</b> first to save a backup.</span></div>`:''}`,
    [{label:'Delete category',cls:'danger',fn:()=>{
      const removing=new Set(cs.map(c=>c.id));
      db.collections=db.collections.filter(c=>c.domain!==d);
      db.domainOrder=(db.domainOrder||[]).filter(x=>x!==d);
      if(db.domainIcons) delete db.domainIcons[d];
      ui.collapsed.delete(d);
      if(ui.active && removing.has(ui.active)) ui.active=null;
      save(); closeModal(); render(); toast('Category deleted');
    }}]);
}

document.getElementById('exportBtn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='codex-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); toast('Exported');
});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
      if(!data.collections) throw 0;
      modal('Import data', `<div style="font-size:14px;color:var(--txt-dim);line-height:1.6">
        Found <b>${data.collections.length}</b> list${data.collections.length===1?'':'s'} in this file.<br><br>
        <b>Merge</b> adds any new lists/entries and fills in descriptions &amp; details on entries you already have (matched by name) &mdash; your other data is untouched.<br>
        <b>Replace</b> swaps out your entire Codex for this file.</div>`,
        [{label:'Merge',cls:'',fn:()=>{ mergeImport(data); closeModal(); }},
         {label:'Replace',cls:'gold',fn:()=>{ db=data; if(!db.domainOrder)db.domainOrder=domainsOrdered(); if(!db.domainIcons)db.domainIcons=SEED.domainIcons;
            normalizeDb(); save(); ui.active=null; closeModal(); render(); toast('Imported'); }}]);
    }catch(err){ toast('Not a valid Codex file'); } };
  r.readAsText(f); e.target.value='';
});
function mergeImport(data){
  let added=0, updated=0;
  (data.collections||[]).forEach(ic=>{
    let existing=db.collections.find(c=>c.domain===ic.domain && c.name.toLowerCase()===ic.name.toLowerCase());
    if(!existing){ const m=db.collections.filter(c=>c.name.toLowerCase()===ic.name.toLowerCase()); if(m.length===1) existing=m[0]; }
    if(existing){
      const byName=new Map(existing.entries.map(e=>[e.name.toLowerCase(),e]));
      (ic.entries||[]).forEach(ie=>{
        const cur=byName.get((ie.name||'').toLowerCase());
        if(cur){
          let ch=false;
          if(ie.desc && ie.desc!==cur.desc){ cur.desc=ie.desc; ch=true; }
          if(ie.fields && Object.keys(ie.fields).length){ cur.fields=Object.assign({}, cur.fields||{}, ie.fields); ch=true; }
          if(ie.tags && ie.tags.length){ cur.tags=[...new Set([...(cur.tags||[]), ...ie.tags])]; ch=true; }
          if(ie.notes && !cur.notes){ cur.notes=ie.notes; ch=true; }
          if(ch) updated++;
        } else {
          existing.entries.push({id:uid('e'),name:ie.name,desc:ie.desc||'',fields:ie.fields||{},tags:ie.tags||[],notes:ie.notes||''});
          added++;
        }
      });
    } else {
      const nc = {...ic, id:uid('col'), entries:(ic.entries||[]).map(ie=>({
        id:uid('e'), name:ie.name, desc:ie.desc||'', fields:ie.fields||{}, tags:ie.tags||[], notes:ie.notes||''
      }))};
      db.collections.push(nc);
      if(!(db.domainOrder||[]).includes(ic.domain))(db.domainOrder=db.domainOrder||[]).push(ic.domain);
      added+=(ic.entries||[]).length;
    }
  });
  normalizeDb();
  save(); render(); toast(`Merged \u00b7 ${added} added, ${updated} updated`);
}

(async()=>{
  /* Load from IndexedDB; migrate from localStorage on first run */
  const idbVal = await _idbGet();
  if(idbVal){ db = idbVal; }
  else{
    try{
      const ls = localStorage.getItem(LS_KEY);
      if(ls){ db = JSON.parse(ls); await _idbPut(db); localStorage.removeItem(LS_KEY); }
    }catch(e){}
  }
  normalizeDb(); save();
  ui.collapsed = new Set(domainsOrdered());
  render();
})();

/* ==================== CAMPAIGN PUBLISH (GM only) ====================
   Chunks the library by domain and writes it to the campaign as
   GM-writable, player-readable docs. Players' tools pull it automatically. */
(function(){
  if (!(window.AFSync && AFSync.isLinked() && AFSync.isGM())) return;
  var btn = document.getElementById('publishBtn');
  if (!btn) return;
  btn.style.display = '';

  btn.addEventListener('click', async function(){
    if (!confirm('Publish your entire Codex to “' + (AFSync.link().name || 'this campaign') +
                 '”?\n\nEvery player in the campaign will be able to browse it (read-only). ' +
                 'Anything you\u2019d rather keep behind the screen should be removed before publishing.')) return;
    btn.disabled = true;
    var orig = btn.textContent;
    try{
      var domains = domainsOrdered();
      var total = 0;
      for (var i = 0; i < domains.length; i++){
        var d = domains[i];
        btn.textContent = '⇪ Publishing ' + (i+1) + '/' + domains.length + '…';
        var cols = db.collections.filter(function(c){ return c.domain === d; });
        total += cols.reduce(function(n,c){ return n + (c.entries||[]).length; }, 0);
        await AFSync.putDoc('gm:codex:' + d, { domain: d, collections: cols });
      }
      await AFSync.putDoc('gm:codex:index', {
        stamp: Date.now(),
        meta: db.meta || {},
        domainOrder: domains,
        domainIcons: db.domainIcons || {},
        entries: total
      });
      btn.textContent = '✓ Published';
      toast('Codex published — players will pick it up automatically');
      setTimeout(function(){ btn.textContent = orig; }, 2500);
    }catch(e){
      toast('⚠ Publish failed: ' + (e.message || 'unknown error'));
      btn.textContent = orig;
    }
    btn.disabled = false;
  });
})();
