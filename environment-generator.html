<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcanaForge — Environment Generator</title>
<meta name="theme-color" content="#0a0c11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spline+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   ARCANAFORGE — ENVIRONMENT GENERATOR  (rolls against the Codex)
   Shared design system: slate-black + gold + blood, Cinzel / Spline Sans.
   ===================================================================== */
:root{
  --bg-0:#0a0c11; --bg-1:#10131b; --bg-2:#181b24;
  --panel:#161922; --panel-2:#1d212c; --line:#2a2f3d; --line-soft:#21252f;
  --gold:#e3b352; --gold-dim:#9c7d3c; --gold-soft:#c9a24b;
  --blood:#c62a30; --blood-dim:#7e2226;
  --txt:#e7e3d8; --txt-soft:#b4b0a4; --txt-faint:#6f6c63;
  --ok:#5fae6b;
  --shadow:0 18px 48px rgba(0,0,0,.55); --radius:16px;
  --display:'Cinzel',serif; --ui:'Spline Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ui);color:var(--txt);
  background:
    radial-gradient(1100px 700px at 12% -8%, rgba(227,179,82,.10), transparent 60%),
    radial-gradient(900px 600px at 108% 4%, rgba(198,42,48,.10), transparent 55%),
    radial-gradient(700px 700px at 50% 120%, rgba(227,179,82,.05), transparent 60%),
    var(--bg-0);
  min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:.2px}
::selection{background:rgba(227,179,82,.28)}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
select{font-family:inherit}
.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:22px 22px 80px}

header.top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:14px 20px;margin-bottom:20px;
  background:linear-gradient(180deg,rgba(31,35,47,.9),rgba(24,27,36,.9));border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:0 10px 30px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03)}
.brand{display:flex;flex-direction:column;gap:1px;margin-right:auto}
.brand .kicker-logo{height:22px;width:auto;display:block;margin-bottom:3px}
.brand h1{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:.02em;color:var(--gold);text-shadow:0 1px 0 #000;line-height:1.05}
.brand h1 .sep{color:var(--txt-faint);font-weight:500;margin:0 8px}
.tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{font-family:var(--ui);font-size:13px;font-weight:500;color:var(--txt);background:var(--panel-2);border:1px solid var(--line);
  padding:8px 13px;border-radius:9px;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover{border-color:var(--gold-dim);color:var(--gold-soft);transform:translateY(-1px)}
.btn.ghost{background:transparent}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7}
.codex-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);color:var(--txt-faint)}
.codex-chip.live{color:var(--ok);border-color:rgba(127,174,107,.4)}
.codex-chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.tbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt-soft);font-size:13px;font-weight:500;transition:.18s;white-space:nowrap}
.tbtn:hover{border-color:var(--gold-dim);color:var(--txt);background:var(--panel-2)}

.layout{display:grid;grid-template-columns:288px 1fr;gap:24px;margin-top:0;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.controls{position:sticky;top:18px;background:linear-gradient(160deg,var(--panel),var(--bg-1));border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.controls h3{font-family:var(--display);font-size:14px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-soft);padding:16px 18px 0}
.ctl-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-faint)}
.field select{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg-2);color:var(--txt);font-size:14px;outline:none;transition:.18s}
.field select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(227,179,82,.12)}
.field .note{font-size:11px;color:var(--txt-faint);font-weight:300}
.gen{width:100%;margin-top:2px;font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.05em;color:#1a1206;cursor:pointer;padding:15px;border-radius:11px;border:none;
  background:linear-gradient(180deg,#f0d59a,#e3b352 45%,#a9863c);
  box-shadow:0 6px 18px rgba(227,179,82,.28),inset 0 1px 0 rgba(255,255,255,.4);transition:.16s;display:flex;align-items:center;justify-content:center;gap:9px}
.gen:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(227,179,82,.4)}
.gen:active{transform:translateY(0)}
.gen:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.gen svg{width:18px;height:18px;stroke:#1a1206;fill:none;stroke-width:2}
.hint{text-align:center;font-size:11px;color:var(--txt-faint);margin-top:9px;letter-spacing:.04em;line-height:1.6}
.hint kbd{background:var(--bg-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:inherit;color:var(--txt-soft)}

.stage{min-height:400px}
.env{background:linear-gradient(165deg,var(--panel),var(--bg-1));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:rise .4s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.env-head{padding:24px 26px;border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(227,179,82,.06),transparent)}
.env-head h2{font-family:var(--display);font-size:clamp(22px,3vw,31px);font-weight:700;letter-spacing:.5px;line-height:1.1;color:var(--gold)}
.env-sub{font-size:13.5px;color:var(--gold-soft);margin-top:6px;letter-spacing:.4px}
.env-desc{font-size:14px;color:var(--txt-soft);margin-top:12px;line-height:1.6;font-weight:300;max-width:800px}
.metarow{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.metapill{font-size:12px;color:var(--txt-soft);background:var(--bg-2);border:1px solid var(--line-soft);border-radius:99px;padding:6px 13px}
.metapill b{color:var(--gold-soft);font-weight:600}

.env-body{padding:6px 26px 22px}
.sec{margin-top:20px}
.sec-title{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-faint);margin-bottom:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line-soft);margin-left:4px}
.fldgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 22px}
.fld .k{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-faint)}
.fld .v{font-size:14px;color:var(--txt);line-height:1.4;margin-top:2px}
.chiprow{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:12.5px;color:var(--txt-soft);background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;padding:6px 11px}
.chip.haz{color:#e9b3ae;border-color:var(--blood-dim);background:rgba(198,42,48,.08)}
.chip.treas{color:var(--gold-soft);border-color:var(--gold-dim);background:rgba(227,179,82,.08)}
.notelist{display:flex;flex-direction:column;gap:6px}
.notelist li{list-style:none;font-size:13.5px;color:var(--txt-soft);padding-left:16px;position:relative;font-weight:300}
.notelist li::before{content:"—";position:absolute;left:0;color:var(--gold-dim)}
.travel{font-size:13.5px;color:var(--txt-soft);line-height:1.65;font-weight:300;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;padding:14px 16px}

.env-foot{display:flex;gap:10px;padding:16px 26px;border-top:1px solid var(--line-soft);background:var(--bg-1)}
.env-foot .tbtn{flex:1;justify-content:center}
.env-foot .save{border-color:var(--gold-dim);color:var(--gold);background:rgba(227,179,82,.08)}
.env-foot .save:hover{background:rgba(227,179,82,.16);border-color:var(--gold)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 30px;color:var(--txt-faint)}
.empty .big{font-size:54px;margin-bottom:18px;filter:grayscale(1) drop-shadow(0 4px 10px rgba(0,0,0,.5));opacity:.7}
.empty h2{font-family:var(--display);font-size:20px;font-weight:600;color:var(--txt-soft);margin-bottom:8px}
.empty p{max-width:440px;color:var(--txt-soft);font-size:14px;line-height:1.65;font-weight:300;margin-bottom:18px}
.empty code{font-family:ui-monospace,monospace;color:var(--gold-soft);font-size:12px}

.roster{margin-top:30px}
.roster-head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line-soft)}
.roster-head h3{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:1px}
.roster-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.rcard{background:linear-gradient(160deg,var(--panel),var(--bg-1));border:1px solid var(--line);border-radius:12px;padding:14px 16px;transition:.16s}
.rcard:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.rcard .rn{font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.4px}
.rcard .rm{font-size:12px;color:var(--txt-faint);margin-top:4px}
.rcard .ra{display:flex;gap:6px;margin-top:11px}
.rcard .ra button{flex:1;font-size:11px;letter-spacing:.6px;padding:7px;border-radius:8px;border:1px solid var(--line);color:var(--txt-soft);transition:.15s}
.rcard .ra button:hover{border-color:var(--gold-dim);color:var(--gold)}
.rcard .ra button.del:hover{border-color:var(--blood-dim);color:var(--blood)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;background:var(--panel-2);border:1px solid var(--gold-dim);color:var(--txt);padding:12px 20px;border-radius:11px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="brand">
      <img class="kicker-logo" src="arcanaforge-wordmark.png" alt="ArcanaForge">
      <h1>Environment <span class="sep">·</span> Generator</h1>
    </div>
    <div class="tools">
      <span class="codex-chip" id="dataChip"><span class="d"></span><span id="dataLbl">No data</span></span>
      <a class="btn ghost" href="dashboard.html" title="Back to the dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>Dashboard</a>
      <button class="btn ghost" id="loadCodexBtn" title="Load a Codex export (JSON)">
        <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Load Codex</button>
      <button class="btn ghost" id="exportLogBtn" title="Export your saved environments">
        <svg viewBox="0 0 24 24"><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3M12 4v12m0 0l4-4m-4 4l-4-4"/></svg>Export</button>
      <button class="btn ghost" id="importLogBtn" title="Import saved environments">
        <svg viewBox="0 0 24 24"><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3M12 16V4m0 0l4 4m-4-4l-4 4"/></svg>Import</button>
      <input type="file" id="codexImport" accept="application/json">
      <input type="file" id="logImport" accept="application/json">
    </div>
  </header>

  <div class="layout">
  <aside class="controls">
    <h3>Chart the World</h3>
    <div class="ctl-body">
      <div class="field"><label>Category</label>
        <select id="fCat"><option value="">Any category</option></select></div>
      <div class="field"><label>Environment Type</label>
        <select id="fType"><option value="">Any type</option></select></div>
      <div class="field"><label>Scale</label>
        <select id="fSize">
          <option value="small">Small</option>
          <option value="medium" selected>Medium</option>
          <option value="large">Large</option>
          <option value="huge">Huge</option>
        </select>
        <span class="note" id="sizeNote"></span></div>
      <button class="gen" id="genBtn">
        <svg viewBox="0 0 24 24"><path d="M3 12c3-6 6-9 9-9s6 3 9 9-6 9-9 9-6-3-9-9z"/><circle cx="12" cy="12" r="2.6"/></svg>
        Generate Environment
      </button>
      <p class="hint">Press <kbd>Space</kbd> or <kbd>G</kbd> to generate</p>
    </div>
  </aside>

  <main class="stage">
    <div id="stageInner"></div>
    <section class="roster" id="rosterWrap" style="display:none">
      <div class="roster-head"><h3>The Atlas — saved environments</h3><span class="rule"></span></div>
      <div class="rgrid" id="rosterGrid"></div>
    </section>
  </main>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   ARCANAFORGE — ENVIRONMENT GENERATOR LOGIC (Codex-driven)
   All environment content — biomes, features, inhabitants, hazards,
   treasures — lives in the Codex under the "Environments" domain. This
   tool only supplies the small, hand-authored generation nuance (weather
   patterns, time-of-day flavor, scale descriptions) that was never really
   "data" so much as generation rules.
   ===================================================================== */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const ROSTER_KEY='dnd-envgen-roster-v1';

/* generation nuance — keyed by environment TYPE NAME (as it appears in the Codex) */
const WEATHER_BY_TYPE={
  'Bustling Capital City':['Partly cloudy','Light rain','Clear skies','Overcast'],
  'Port Town':['Sea breeze','Foggy','Storm approaching','Clear and salty air'],
  'Floating City':['High altitude winds','Cloud cover','Clear skies','Electrical storms'],
  'Underground Metropolis':['Stable underground climate','Humid air','Cool and dry'],
  'Trade Crossroads':['Dusty and dry','Seasonal weather','Windy conditions'],
  'Enchanted Forest':['Mystical mists','Dappled sunlight','Gentle rain','Magical aurora'],
  'Frozen Tundra':['Blizzard conditions','Clear and frigid','Aurora visible','Light snow'],
  'Shattered Skylands':['High altitude storms','Crystal clear air','Swirling winds','Lightning between islands']
};
const WEATHER_FALLBACK=['Pleasant weather','Changing conditions','Natural patterns'];
const SCALE_INFO={
  small:{description:'A localized area that can be thoroughly explored in a few hours',area:'A few square miles'},
  medium:{description:'A substantial region requiring a day or more to explore fully',area:'Several square miles'},
  large:{description:'An extensive territory spanning many days of travel',area:'Dozens of square miles'},
  huge:{description:'A vast region that could take weeks to map completely',area:'Hundreds of square miles'}
};
const EXPLORE_TIME={small:'2-4 hours',medium:'1-2 days',large:'3-7 days',huge:'1-4 weeks'};
const SIZE_ADVICE={
  small:'Can be explored thoroughly in a single expedition.',
  medium:'Recommend establishing a base camp for multi-day exploration.',
  large:'Requires careful planning and multiple resupply points.',
  huge:'Major expedition requiring extensive logistics and planning.'
};
const POI_COUNT={small:2,medium:3,large:5,huge:7};
const BASE_POI=['Ancient monument of unknown origin','Unusual geological formation','Abandoned structure with history','Natural landmark visible from distance','Hidden cave or secret area'];

/* ---- state ---- */
let library=null, env=null, roster=loadRoster();

/* =====================================================================
   CODEX DATA
   ===================================================================== */
const CODEX_SHARED_CACHE='codex-shared-cache-v1';
const CODEX_LEGACY_CACHES=['dnd-table-codex-cache-v1','dnd-npcgen-codex-cache-v1','ttrpg-char-codex-cache'];
function codexLooks(o){return !!(o&&typeof o==='object'&&Array.isArray(o.collections)&&o.collections.some(c=>c&&Array.isArray(c.entries)));}
function codexUnwrap(o){if(codexLooks(o))return o;if(o&&typeof o==='object'){if(o.data&&codexLooks(o.data))return o.data;for(const k of['library','codex','state'])if(codexLooks(o[k]))return o[k];}return null;}
function codexCount(l){return l.collections.reduce((n,c)=>n+(Array.isArray(c.entries)?c.entries.length:0),0);}
function codexStamp(o,l){if(o&&typeof o.at==='number')return o.at;const m=(l&&l.meta)||{};for(const f of['updated','exported','savedAt','modified','lastSaved','date']){if(m[f]){const t=Date.parse(m[f]);if(!isNaN(t))return t;}}return 0;}
const _IDB_DB='the-table-codex',_IDB_ST='data',_IDB_REC='codex_db_v1';
function _idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(_IDB_DB,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB_ST);r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej();});}
async function _idbGet(){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const r=idb.transaction(_IDB_ST).objectStore(_IDB_ST).get(_IDB_REC);r.onsuccess=e=>res(e.target.result||null);r.onerror=()=>rej();});}catch(e){return null;}}
async function _idbPut(val){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const tx=idb.transaction(_IDB_ST,'readwrite');tx.objectStore(_IDB_ST).put(val,_IDB_REC);tx.oncomplete=()=>res();tx.onerror=()=>rej();});}catch(e){}}
async function codexLoad(){const iv=await _idbGet();if(iv){const lib=codexUnwrap(iv);if(lib)return{data:lib,source:'codex (idb)',entries:codexCount(lib)};}let best=null;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);const v=localStorage.getItem(k);if(!v||(v[0]!=='{'&&v[0]!=='['))continue;let o;try{o=JSON.parse(v);}catch(e){continue;}const lib=codexUnwrap(o);if(!lib)continue;const c={lib,entries:codexCount(lib),stamp:codexStamp(o,lib)};if(!best||c.entries>best.entries||(c.entries===best.entries&&c.stamp>best.stamp))best={...c,key:k};}return best?{data:best.lib,source:best.key,entries:best.entries}:null;}
function codexSaveSnapshot(lib){_idbPut(lib);try{localStorage.setItem(CODEX_SHARED_CACHE,JSON.stringify({at:Date.now(),data:lib}));}catch(e){}CODEX_LEGACY_CACHES.forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});return true;}
async function detectCodex(){ const r=await codexLoad(); library=r?r.data:null; refreshChip(); populateFilters(); }
function refreshChip(){const chip=$('#dataChip');if(library){chip.classList.add('live');$('#dataLbl').textContent=countEntries(library).toLocaleString()+' entries';$('#genBtn').disabled=false;}else{chip.classList.remove('live');$('#dataLbl').textContent='No Codex data';$('#genBtn').disabled=true;}}
function countEntries(l){return l.collections.reduce((n,c)=>n+(Array.isArray(c.entries)?c.entries.length:0),0);}

/* ---- list resolution (Environments domain, name-based) ---- */
function allCols(){return library?library.collections.filter(c=>c&&Array.isArray(c.entries)):[];}
function envCols(){return allCols().filter(c=>String(c.domain||'')==='Environments');}
function findByName(name){const lc=String(name).toLowerCase();return envCols().find(c=>String(c.name||'').toLowerCase()===lc)||null;}
function pick(arr){return arr&&arr.length?arr[Math.floor(Math.random()*arr.length)]:null;}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function sample(arr,n){if(!arr||!arr.length)return[];const pool=[...arr],out=[];n=Math.min(n,pool.length);while(out.length<n){out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);}return out;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function typesList(){return findByName('Environment Types');}
function categories(){const c=typesList();if(!c)return[];const set=new Set();c.entries.forEach(e=>(e.tags||[]).forEach(t=>set.add(t)));return[...set];}
function typesInCategory(cat){const c=typesList();if(!c)return[];return cat?c.entries.filter(e=>(e.tags||[]).includes(cat)):c.entries;}
function byAttr(typeName,attrTag){const c=findByName(typeName);if(!c)return[];return c.entries.filter(e=>(e.tags||[]).includes(attrTag)).map(e=>e.name);}

/* =====================================================================
   FILTERS
   ===================================================================== */
function populateFilters(){
  const catSel=$('#fCat'), typeSel=$('#fType');
  const curCat=catSel.value, curType=typeSel.value;
  catSel.innerHTML='<option value="">Any category</option>';
  categories().forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;catSel.appendChild(o);});
  catSel.value=curCat;
  populateTypes(); typeSel.value=curType;
  updateSizeNote();
}
function populateTypes(){
  const cat=$('#fCat').value, typeSel=$('#fType');
  typeSel.innerHTML='<option value="">Any type</option>';
  typesInCategory(cat).forEach(e=>{const o=document.createElement('option');o.value=o.textContent=e.name;typeSel.appendChild(o);});
}
function updateSizeNote(){ const s=SCALE_INFO[$('#fSize').value]; $('#sizeNote').textContent=s?s.area:''; }
$('#fCat').addEventListener('change',()=>{populateTypes();});
$('#fSize').addEventListener('change',updateSizeNote);

/* =====================================================================
   GENERATION
   ===================================================================== */
function chooseType(){
  const fType=$('#fType').value, fCat=$('#fCat').value;
  const all=typesList(); if(!all||!all.entries.length)return null;
  if(fType){ const e=all.entries.find(x=>x.name===fType); if(e)return e; }
  const pool=typesInCategory(fCat);
  return pick(pool.length?pool:all.entries);
}
function weatherFor(typeName){ return pick(WEATHER_BY_TYPE[typeName]||WEATHER_FALLBACK); }
function timeEffects(typeName){
  const base={dawn:'First light reveals new details and awakening activity',day:'Full visibility with peak activity levels',
    dusk:'Changing light creates atmospheric shifts',night:'Darkness brings different sounds and hidden movement'};
  const lc=typeName.toLowerCase();
  if(lc.includes('forest')||lc.includes('jungle')) base.night+='. Forest sounds intensify with nocturnal creatures';
  else if(lc.includes('city')||lc.includes('town')||lc.includes('metropolis')) base.night+='. City lights create new patterns of activity';
  else if(lc.includes('underground')) for(const k in base) base[k]='Underground, '+base[k].toLowerCase();
  return base;
}
function pointsOfInterest(features,size){
  const poi=[...BASE_POI];
  if(features.length) poi.push(...sample(features,Math.min(3,features.length)));
  return sample(poi,Math.min(POI_COUNT[size]||3,poi.length));
}
function travelNotes(hazards,size){
  let notes=`This ${size} environment requires appropriate preparation. `;
  if(hazards.length) notes+=`Primary concern: ${pick(hazards).toLowerCase()}. `;
  notes+=SIZE_ADVICE[size]||'Standard expedition planning recommended.';
  return notes;
}
function generate(){
  if(!library)return;
  const size=$('#fSize').value||'medium';
  const typeEntry=chooseType(); if(!typeEntry)return;
  const pools={
    features: byAttr(typeEntry.name,'feature'),
    inhabitants: byAttr(typeEntry.name,'inhabitant'),
    hazards: byAttr(typeEntry.name,'hazard'),
    atmospheres: byAttr(typeEntry.name,'atmosphere'),
    sounds: byAttr(typeEntry.name,'sound'),
    smells: byAttr(typeEntry.name,'smell'),
    treasures: byAttr(typeEntry.name,'treasure'),
  };
  const features=sample(pools.features,ri(3,Math.min(6,pools.features.length||3)));
  const inhabitants=sample(pools.inhabitants,ri(2,Math.min(4,pools.inhabitants.length||2)));
  const hazards=sample(pools.hazards,ri(1,Math.min(3,pools.hazards.length||1)));
  const treasures=sample(pools.treasures,ri(1,Math.min(3,pools.treasures.length||1)));
  const catTag=(typeEntry.tags&&typeEntry.tags[0])||'Environment';
  env={
    name:typeEntry.name, catName:catTag, size, description:typeEntry.desc||'',
    scaleDescription:SCALE_INFO[size].description, atmosphere:pick(pools.atmospheres)||'Mysterious',
    sounds:pick(pools.sounds)||'Ambient noise', smells:pick(pools.smells)||'Natural scents',
    features, inhabitants, hazards, treasures, weather:weatherFor(typeEntry.name), timeEffects:timeEffects(typeEntry.name),
    poi:pointsOfInterest(pools.features,size), travelNotes:travelNotes(pools.hazards,size), explorationTime:EXPLORE_TIME[size]
  };
  renderEnv();
}

/* =====================================================================
   RENDER
   ===================================================================== */
function fieldRow(k,v){ return v?`<div class="fld"><span class="k">${esc(k)}</span><div class="v">${esc(v)}</div></div>`:''; }
function chips(list,cls){ return (list||[]).map(v=>`<span class="chip ${cls||''}">${esc(v)}</span>`).join(''); }
function renderEnv(){
  const stage=$('#stageInner');
  if(!env){ renderEmptyOrPrompt(); return; }
  const meta=`<span class="metapill"><b>${esc(env.catName)}</b></span>
    <span class="metapill">${esc(env.size[0].toUpperCase()+env.size.slice(1))} scale</span>
    <span class="metapill">Weather: ${esc(env.weather)}</span>
    <span class="metapill">${esc(env.explorationTime)} to explore</span>`;
  const fields=[fieldRow('Atmosphere',env.atmosphere),fieldRow('Sounds',env.sounds),fieldRow('Smells',env.smells)].join('');
  const timeGrid=['dawn','day','dusk','night'].map(k=>`<div class="timecard"><div class="tk">${k}</div><div class="tv">${esc(env.timeEffects[k])}</div></div>`).join('');
  const poi=env.poi.map(p=>`<li>${esc(p)}</li>`).join('');
  stage.innerHTML=`<article class="env">
    <div class="env-head">
      <h2>${esc(env.name)}</h2>
      <div class="env-sub">${esc(env.catName)}</div>
      <div class="env-desc">${esc(env.description)}</div>
      <div class="env-desc" style="margin-top:6px;font-size:13px">${esc(env.scaleDescription)}</div>
      <div class="metarow">${meta}</div>
    </div>
    <div class="env-body">
      <div class="sec"><div class="sec-title">Atmosphere</div><div class="fldgrid">${fields}</div></div>
      <div class="sec"><div class="sec-title">Notable Features</div><div class="chiprow">${chips(env.features)}</div></div>
      <div class="sec"><div class="sec-title">Inhabitants</div><div class="chiprow">${chips(env.inhabitants)}</div></div>
      <div class="sec"><div class="sec-title">Hazards</div><div class="chiprow">${chips(env.hazards,'haz')}</div></div>
      <div class="sec"><div class="sec-title">Unique Treasures</div><div class="chiprow">${chips(env.treasures,'treas')}</div></div>
      <div class="sec"><div class="sec-title">Time of Day</div><div class="timegrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">${timeGrid}</div></div>
      <div class="sec"><div class="sec-title">Points of Interest</div><ul class="notelist">${poi}</ul></div>
      <div class="sec"><div class="sec-title">Travel Notes</div><div class="travel">${esc(env.travelNotes)}</div></div>
    </div>
    <div class="env-foot"><button class="tbtn save" id="saveBtn">✦ Save to atlas</button><button class="tbtn" id="copyBtn">⧉ Copy text</button></div>
  </article>`;
  $('#saveBtn').onclick=saveCurrent; $('#copyBtn').onclick=copyCurrent;
}
function renderEmptyOrPrompt(){
  const stage=$('#stageInner');
  if(!library){
    stage.innerHTML=`<div class="empty"><div class="big">📖</div><h2>Connect the Codex first</h2>
      <p>This generator rolls against the Codex's <strong>Environments</strong> domain. Served alongside the Codex it loads automatically; as a loose <code>file://</code> page, hit <strong>Load Codex</strong> above and choose the file from the Codex's <strong>Export</strong> (or import <code>arcanaforge-starter-pack.json</code> once to add the Dungeons &amp; Environments data).</p>
      <button class="btn ghost" onclick="document.getElementById('codexImport').click()">Load Codex JSON</button></div>`;
  } else if(!typesList()){
    stage.innerHTML=`<div class="empty"><div class="big">🗺️</div><h2>No Environments data in this Codex</h2>
      <p>Your Codex is connected but doesn't have an <strong>Environments</strong> domain yet. Import <code>arcanaforge-starter-pack.json</code> from the-table folder into your Codex to add it.</p></div>`;
  } else {
    stage.innerHTML=`<div class="empty"><div class="big">🗺️</div><h2>The world awaits mapping</h2>
      <p>Pick a category, type and scale on the left, then <strong>Generate</strong> to chart a full environment — description, atmosphere, inhabitants, hazards, weather and points of interest, all rolled from your Codex.</p></div>`;
  }
}

/* =====================================================================
   ATLAS (roster)
   ===================================================================== */
function loadRoster(){try{const r=JSON.parse(localStorage.getItem(ROSTER_KEY));return Array.isArray(r)?r:[];}catch(e){return[];}}
function saveRoster(){localStorage.setItem(ROSTER_KEY,JSON.stringify(roster));}
function saveCurrent(){if(!env)return;roster.unshift({id:'env_'+Date.now().toString(36),created:Date.now(),env});saveRoster();renderRoster();toast('Saved "'+env.name+'" to the atlas.');}
function renderRoster(){
  const wrap=$('#rosterWrap'); if(!roster.length){wrap.style.display='none';return;} wrap.style.display='block';
  $('#rosterGrid').innerHTML=roster.map(r=>{const e=r.env;return `<div class="rcard"><div class="rn">${esc(e.name)}</div><div class="rm">${esc(e.catName)} · ${esc(e.size)} scale</div>
    <div class="ra"><button data-load="${r.id}">Load</button><button class="del" data-del="${r.id}">Delete</button></div></div>`;}).join('');
  $$('[data-load]').forEach(b=>b.onclick=()=>{const r=roster.find(x=>x.id===b.dataset.load);if(r){env=r.env;renderEnv();window.scrollTo({top:0,behavior:'smooth'});toast('Loaded "'+env.name+'".');}});
  $$('[data-del]').forEach(b=>b.onclick=()=>{roster=roster.filter(x=>x.id!==b.dataset.del);saveRoster();renderRoster();toast('Removed.');});
}
function copyCurrent(){
  if(!env)return;
  const L=[env.name,env.catName+' · '+env.size+' scale',env.description,env.scaleDescription,'',
    'Atmosphere: '+env.atmosphere,'Sounds: '+env.sounds,'Smells: '+env.smells,'Weather: '+env.weather,'',
    'Features: '+env.features.join(', '),'Inhabitants: '+env.inhabitants.join(', '),'Hazards: '+env.hazards.join(', '),'Unique treasures: '+env.treasures.join(', '),'',
    'Points of interest: '+env.poi.join(', '),'','Travel notes: '+env.travelNotes,'Exploration time: '+env.explorationTime];
  navigator.clipboard?.writeText(L.join('\n')).then(()=>toast('Copied to clipboard.'),()=>toast('Copy failed.'));
}

/* =====================================================================
   GM / CODEX IMPORT / LOG EXPORT-IMPORT / MISC
   ===================================================================== */
$('#genBtn').onclick=generate;
$('#loadCodexBtn').onclick=()=>$('#codexImport').click();
$('#codexImport').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);const lib=codexUnwrap(d);if(!lib){toast('That isn’t a Codex export.');return;}codexSaveSnapshot(lib);detectCodex();toast('Codex loaded · '+countEntries(lib).toLocaleString()+' entries.');renderEnv();}catch(err){toast('Could not read that file.');}};r.readAsText(f);e.target.value='';});
$('#exportLogBtn').onclick=()=>{if(!roster.length){toast('Atlas is empty.');return;}download(JSON.stringify({app:'environment-generator',version:1,exported:new Date().toISOString(),environments:roster},null,2),'environment-atlas.json');toast('Atlas exported.');};
$('#importLogBtn').onclick=()=>$('#logImport').click();
$('#logImport').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);const arr=d.environments||(Array.isArray(d)?d:[]);let n=0;arr.forEach(x=>{if(x&&x.env){x.id=x.id||'env_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);roster.push(x);n++;}});saveRoster();renderRoster();toast('Imported '+n+' environment'+(n===1?'':'s')+'.');}catch(err){toast('Could not read that file.');}};r.readAsText(f);e.target.value='';});
function download(t,name){const b=new Blob([t],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}
let toastT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}
document.addEventListener('keydown',e=>{if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;if(e.code==='Space'||e.key.toLowerCase()==='g'){e.preventDefault();if(library)generate();}});

/* init */
detectCodex();renderRoster();renderEmptyOrPrompt();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&!library)detectCodex();});
</script>
<script src="arcanaforge-quicksearch.js"></script>
<script src="arcanaforge-update-banner.js"></script>
</body>
