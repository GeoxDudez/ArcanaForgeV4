<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcanaForge — Dungeon Generator</title>
<meta name="theme-color" content="#0a0c11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spline+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   ARCANAFORGE — DUNGEON GENERATOR  (rolls against the Codex)
   Shared design system: slate-black + gold + blood, Cinzel / Spline Sans.
   ===================================================================== */
:root{
  --bg-0:#0a0c11; --bg-1:#10131b; --bg-2:#181b24;
  --panel:#161922; --panel-2:#1d212c; --line:#2a2f3d; --line-soft:#21252f;
  --gold:#e3b352; --gold-dim:#9c7d3c; --gold-soft:#c9a24b;
  --blood:#c62a30; --blood-dim:#7e2226;
  --txt:#e7e3d8; --txt-soft:#b4b0a4; --txt-faint:#6f6c63;
  --ok:#5fae6b;
  --shadow:0 18px 48px rgba(0,0,0,.55); --radius:16px;
  --display:'Cinzel',serif; --ui:'Spline Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ui);color:var(--txt);
  background:
    radial-gradient(1100px 700px at 12% -8%, rgba(227,179,82,.10), transparent 60%),
    radial-gradient(900px 600px at 108% 4%, rgba(198,42,48,.10), transparent 55%),
    radial-gradient(700px 700px at 50% 120%, rgba(227,179,82,.05), transparent 60%),
    var(--bg-0);
  min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:.2px}
::selection{background:rgba(227,179,82,.28)}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
select{font-family:inherit}
.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:22px 22px 80px}

header.top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:14px 20px;margin-bottom:20px;
  background:linear-gradient(180deg,rgba(31,35,47,.9),rgba(24,27,36,.9));border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:0 10px 30px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03)}
.brand{display:flex;flex-direction:column;gap:1px;margin-right:auto}
.brand .kicker-logo{height:22px;width:auto;display:block;margin-bottom:3px}
.brand h1{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:.02em;color:var(--gold);text-shadow:0 1px 0 #000;line-height:1.05}
.brand h1 .sep{color:var(--txt-faint);font-weight:500;margin:0 8px}
.tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{font-family:var(--ui);font-size:13px;font-weight:500;color:var(--txt);background:var(--panel-2);border:1px solid var(--line);
  padding:8px 13px;border-radius:9px;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover{border-color:var(--gold-dim);color:var(--gold-soft);transform:translateY(-1px)}
.btn.ghost{background:transparent}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7}
.codex-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);color:var(--txt-faint)}
.codex-chip.live{color:var(--ok);border-color:rgba(127,174,107,.4)}
.codex-chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.gm{display:flex;align-items:center;gap:9px;padding-left:4px;cursor:pointer}
.gm .lab{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-soft)}
.switch{position:relative;width:44px;height:24px;border-radius:13px;background:var(--panel-2);border:1px solid var(--line);transition:.18s;flex:none}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--txt-soft);transition:.18s}
.switch.on{background:rgba(198,42,48,.25);border-color:var(--blood)}
.switch.on::after{left:22px;background:var(--blood)}
.tbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--txt-soft);font-size:13px;font-weight:500;transition:.18s;white-space:nowrap}
.tbtn:hover{border-color:var(--gold-dim);color:var(--txt);background:var(--panel-2)}

.layout{display:grid;grid-template-columns:288px 1fr;gap:24px;margin-top:0;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.controls{position:sticky;top:18px;background:linear-gradient(160deg,var(--panel),var(--bg-1));border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.controls h3{font-family:var(--display);font-size:14px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold-soft);padding:16px 18px 0}
.ctl-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-faint)}
.field select{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg-2);color:var(--txt);font-size:14px;outline:none;transition:.18s}
.field select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(227,179,82,.12)}
.field .note{font-size:11px;color:var(--txt-faint);font-weight:300}
.gen{width:100%;margin-top:2px;font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.05em;color:#1a1206;cursor:pointer;padding:15px;border-radius:11px;border:none;
  background:linear-gradient(180deg,#f0d59a,#e3b352 45%,#a9863c);
  box-shadow:0 6px 18px rgba(227,179,82,.28),inset 0 1px 0 rgba(255,255,255,.4);transition:.16s;display:flex;align-items:center;justify-content:center;gap:9px}
.gen:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(227,179,82,.4)}
.gen:active{transform:translateY(0)}
.gen:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.gen svg{width:18px;height:18px;stroke:#1a1206;fill:none;stroke-width:2}
.hint{text-align:center;font-size:11px;color:var(--txt-faint);margin-top:9px;letter-spacing:.04em;line-height:1.6}
.hint kbd{background:var(--bg-2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:inherit;color:var(--txt-soft)}

.stage{min-height:400px}
.dun{background:linear-gradient(165deg,var(--panel),var(--bg-1));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:rise .4s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.dun-head{padding:24px 26px;border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(227,179,82,.06),transparent)}
.dun-head h2{font-family:var(--display);font-size:clamp(22px,3vw,31px);font-weight:700;letter-spacing:.5px;line-height:1.1;color:var(--gold)}
.dun-sub{font-size:13.5px;color:var(--gold-soft);margin-top:6px;letter-spacing:.4px}
.dun-desc{font-size:14px;color:var(--txt-soft);margin-top:12px;line-height:1.6;font-weight:300;max-width:800px}
.metarow{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.metapill{font-size:12px;color:var(--txt-soft);background:var(--bg-2);border:1px solid var(--line-soft);border-radius:99px;padding:6px 13px}
.metapill b{color:var(--gold-soft);font-weight:600}

.dun-body{padding:6px 26px 22px}
.sec{margin-top:20px}
.sec-title{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-faint);margin-bottom:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line-soft);margin-left:4px}
.fldgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px 22px}
.fld .k{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-faint)}
.fld .v{font-size:14px;color:var(--txt);line-height:1.4;margin-top:2px}
.notelist{display:flex;flex-direction:column;gap:6px}
.notelist li{list-style:none;font-size:13.5px;color:var(--txt-soft);padding-left:16px;position:relative;font-weight:300}
.notelist li::before{content:"—";position:absolute;left:0;color:var(--gold-dim)}

/* rooms */
.rooms{display:flex;flex-direction:column;gap:14px}
.room{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:16px 18px}
.room-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.room-num{font-family:var(--display);font-size:14px;font-weight:700;color:var(--gold);flex:none}
.room-type{font-size:14.5px;font-weight:600;color:var(--txt)}
.room-dims{font-size:11.5px;color:var(--txt-faint);margin-left:auto;font-variant-numeric:tabular-nums}
.room-desc{font-size:13.5px;color:var(--txt-soft);line-height:1.6;margin-top:9px;font-weight:300}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11.5px;color:var(--txt-soft);background:var(--panel-2);border:1px solid var(--line-soft);border-radius:8px;padding:4px 10px}
.chip.tag{color:var(--txt-faint);letter-spacing:.5px;text-transform:uppercase;font-size:10px}
.room-trap{margin-top:10px;font-size:12.5px;color:var(--blood);display:flex;align-items:center;gap:7px}
.room-trap .gmv{filter:blur(5px);user-select:none}
body.gm-mode .room-trap .gmv{filter:none;user-select:auto}
.gmtag{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--blood);border:1px solid var(--blood-dim);border-radius:99px;padding:2px 7px;margin-left:4px}
.room-conn{margin-top:9px;font-size:12px;color:var(--txt-faint);line-height:1.6}
.room-conn b{color:var(--gold-soft);font-weight:500}

.dun-foot{display:flex;gap:10px;padding:16px 26px;border-top:1px solid var(--line-soft);background:var(--bg-1)}
.dun-foot .tbtn{flex:1;justify-content:center}
.dun-foot .save{border-color:var(--gold-dim);color:var(--gold);background:rgba(227,179,82,.08)}
.dun-foot .save:hover{background:rgba(227,179,82,.16);border-color:var(--gold)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 30px;color:var(--txt-faint)}
.empty .big{font-size:54px;margin-bottom:18px;filter:grayscale(1) drop-shadow(0 4px 10px rgba(0,0,0,.5));opacity:.7}
.empty h2{font-family:var(--display);font-size:20px;font-weight:600;color:var(--txt-soft);margin-bottom:8px}
.empty p{max-width:440px;color:var(--txt-soft);font-size:14px;line-height:1.65;font-weight:300;margin-bottom:18px}
.empty code{font-family:ui-monospace,monospace;color:var(--gold-soft);font-size:12px}

.roster{margin-top:30px}
.roster-head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line-soft)}
.roster-head h3{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:1px}
.roster-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.rcard{background:linear-gradient(160deg,var(--panel),var(--bg-1));border:1px solid var(--line);border-radius:12px;padding:14px 16px;transition:.16s}
.rcard:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.rcard .rn{font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:.4px}
.rcard .rm{font-size:12px;color:var(--txt-faint);margin-top:4px}
.rcard .ra{display:flex;gap:6px;margin-top:11px}
.rcard .ra button{flex:1;font-size:11px;letter-spacing:.6px;padding:7px;border-radius:8px;border:1px solid var(--line);color:var(--txt-soft);transition:.15s}
.rcard .ra button:hover{border-color:var(--gold-dim);color:var(--gold)}
.rcard .ra button.del:hover{border-color:var(--blood-dim);color:var(--blood)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;background:var(--panel-2);border:1px solid var(--gold-dim);color:var(--txt);padding:12px 20px;border-radius:11px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="brand">
      <img class="kicker-logo" src="arcanaforge-wordmark.png" alt="ArcanaForge">
      <h1>Dungeon <span class="sep">·</span> Generator</h1>
    </div>
    <div class="tools">
      <span class="codex-chip" id="dataChip"><span class="d"></span><span id="dataLbl">No data</span></span>
      <a class="btn ghost" href="dashboard.html" title="Back to the dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>Dashboard</a>
      <button class="btn ghost" id="loadCodexBtn" title="Load a Codex export (JSON)">
        <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Load Codex</button>
      <button class="btn ghost" id="exportLogBtn" title="Export your saved dungeons">
        <svg viewBox="0 0 24 24"><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3M12 4v12m0 0l4-4m-4 4l-4-4"/></svg>Export</button>
      <button class="btn ghost" id="importLogBtn" title="Import saved dungeons">
        <svg viewBox="0 0 24 24"><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3M12 16V4m0 0l4 4m-4-4l-4 4"/></svg>Import</button>
      <div class="gm" id="gmToggle" title="GM Mode reveals traps and hidden dangers">
        <span class="lab">GM</span><div class="switch" id="gmSwitch"></div></div>
      <input type="file" id="codexImport" accept="application/json">
      <input type="file" id="logImport" accept="application/json">
    </div>
  </header>

  <div class="layout">
  <aside class="controls">
    <h3>Delve the Depths</h3>
    <div class="ctl-body">
      <div class="field"><label>Category</label>
        <select id="fCat"><option value="">Any category</option></select></div>
      <div class="field"><label>Dungeon Type</label>
        <select id="fType"><option value="">Any type</option></select></div>
      <div class="field"><label>Size</label>
        <select id="fSize"><option value="">Default</option></select>
        <span class="note" id="sizeNote"></span></div>
      <button class="gen" id="genBtn">
        <svg viewBox="0 0 24 24"><path d="M12 2 3 7v6c0 5 4 8 9 9 5-1 9-4 9-9V7l-9-5z"/></svg>
        Generate Dungeon
      </button>
      <p class="hint">Press <kbd>Space</kbd> or <kbd>G</kbd> to generate · toggle <kbd>GM</kbd> to reveal traps</p>
    </div>
  </aside>

  <main class="stage">
    <div id="stageInner"></div>
    <section class="roster" id="rosterWrap" style="display:none">
      <div class="roster-head"><h3>The Delve Log — saved dungeons</h3><span class="rule"></span></div>
      <div class="rgrid" id="rosterGrid"></div>
    </section>
  </main>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   ARCANAFORGE — DUNGEON GENERATOR LOGIC (Codex-driven)
   All dungeon content — types, room features, traps, sizes, room types,
   connections — lives in the Codex under the "Dungeons" domain. This tool
   only supplies the small, hand-authored flavor tables (lighting, and the
   "which types feel more dangerous / grander / cramped" hints) that were
   never really "data" so much as generation nuance.
   ===================================================================== */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const ROSTER_KEY='dnd-dungeongen-roster-v1', GM_KEY='dnd-dungeongen-gm-v1';

/* generation nuance — keyed by dungeon TYPE NAME (as it appears in the Codex) */
const LIGHTING_BY_TYPE={
  'Natural Caverns':['Pitch black','Faint phosphorescent glow','Light filtering from above'],
  'Crystal Caves':['Prismatic light reflections','Soft crystal glow','Brilliant refractions'],
  'Dwarven Stronghold':['Brazier light','Forge glow remnants','Torch sconces'],
  'Arcane Labyrinth':['Magical luminescence','Floating orbs of light','Glowing runes'],
  'Forgotten Tomb':['Tomb-cold darkness','Flickering burial flames','Spectral illumination']
};
const LIGHTING_FALLBACK=['Dim torch light','Natural light','Complete darkness'];
const GENERAL_HAZARDS=['Unstable ceiling structure requires caution','Poor air circulation may cause fatigue','Slippery surfaces throughout increase difficulty','Strange echoes make stealth challenging','Unusual temperature variations affect comfort','Magnetic anomalies interfere with compasses'];
const DANGEROUS_TYPES=['Arcane Labyrinth','Crystal Caves'];
const MAGICAL_TYPES=['Crystal Caves','Arcane Labyrinth'];
const GRAND_TYPES=['Dwarven Stronghold'];
const NATURAL_TYPES=['Natural Caverns','Crystal Caves','Underground River System'];
const CRAMPED_TYPES=['Abandoned Mine'];
const BASE_LEVEL={small:2,medium:4,large:7,huge:10};
const TIME_ESTIMATE={small:'1-2 hours',medium:'2-4 hours',large:'4-6 hours',huge:'6+ hours (multiple sessions)'};

/* ---- state ---- */
let library=null, dungeon=null, roster=loadRoster();
let gmMode=localStorage.getItem(GM_KEY)==='1';

/* =====================================================================
   CODEX DATA
   ===================================================================== */
/* ===== SHARED CODEX ACCESS · identical across every Table tool ===== */
const CODEX_SHARED_CACHE='codex-shared-cache-v1';
const CODEX_LEGACY_CACHES=['dnd-table-codex-cache-v1','dnd-npcgen-codex-cache-v1','ttrpg-char-codex-cache'];
function codexLooks(o){return !!(o&&typeof o==='object'&&Array.isArray(o.collections)&&o.collections.some(c=>c&&Array.isArray(c.entries)));}
function codexUnwrap(o){if(codexLooks(o))return o;if(o&&typeof o==='object'){if(o.data&&codexLooks(o.data))return o.data;for(const k of['library','codex','state'])if(codexLooks(o[k]))return o[k];}return null;}
function codexCount(l){return l.collections.reduce((n,c)=>n+(Array.isArray(c.entries)?c.entries.length:0),0);}
function codexStamp(o,l){if(o&&typeof o.at==='number')return o.at;const m=(l&&l.meta)||{};for(const f of['updated','exported','savedAt','modified','lastSaved','date']){if(m[f]){const t=Date.parse(m[f]);if(!isNaN(t))return t;}}return 0;}
const _IDB_DB='the-table-codex',_IDB_ST='data',_IDB_REC='codex_db_v1';
function _idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(_IDB_DB,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB_ST);r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej();});}
async function _idbGet(){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const r=idb.transaction(_IDB_ST).objectStore(_IDB_ST).get(_IDB_REC);r.onsuccess=e=>res(e.target.result||null);r.onerror=()=>rej();});}catch(e){return null;}}
async function _idbPut(val){try{const idb=await _idbOpen();return new Promise((res,rej)=>{const tx=idb.transaction(_IDB_ST,'readwrite');tx.objectStore(_IDB_ST).put(val,_IDB_REC);tx.oncomplete=()=>res();tx.onerror=()=>rej();});}catch(e){}}
async function codexLoad(){const iv=await _idbGet();if(iv){const lib=codexUnwrap(iv);if(lib)return{data:lib,source:'codex (idb)',entries:codexCount(lib)};}let best=null;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);const v=localStorage.getItem(k);if(!v||(v[0]!=='{'&&v[0]!=='['))continue;let o;try{o=JSON.parse(v);}catch(e){continue;}const lib=codexUnwrap(o);if(!lib)continue;const c={lib,entries:codexCount(lib),stamp:codexStamp(o,lib)};if(!best||c.entries>best.entries||(c.entries===best.entries&&c.stamp>best.stamp))best={...c,key:k};}return best?{data:best.lib,source:best.key,entries:best.entries}:null;}
function codexSaveSnapshot(lib){_idbPut(lib);try{localStorage.setItem(CODEX_SHARED_CACHE,JSON.stringify({at:Date.now(),data:lib}));}catch(e){}CODEX_LEGACY_CACHES.forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});return true;}
async function detectCodex(){ const r=await codexLoad(); library=r?r.data:null; refreshChip(); populateFilters(); }
function refreshChip(){const chip=$('#dataChip');if(library){chip.classList.add('live');$('#dataLbl').textContent=countEntries(library).toLocaleString()+' entries';$('#genBtn').disabled=false;}else{chip.classList.remove('live');$('#dataLbl').textContent='No Codex data';$('#genBtn').disabled=true;}}
function countEntries(l){return l.collections.reduce((n,c)=>n+(Array.isArray(c.entries)?c.entries.length:0),0);}

/* ---- list resolution (Dungeons domain, name-based) ---- */
function allCols(){return library?library.collections.filter(c=>c&&Array.isArray(c.entries)):[];}
function dungeonCols(){return allCols().filter(c=>String(c.domain||'')==='Dungeons');}
function findByName(name){const lc=String(name).toLowerCase();return dungeonCols().find(c=>String(c.name||'').toLowerCase()===lc)||null;}
function pick(arr){return arr&&arr.length?arr[Math.floor(Math.random()*arr.length)]:null;}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function sample(arr,n){if(!arr||!arr.length)return[];const pool=[...arr],out=[];n=Math.min(n,pool.length);while(out.length<n){out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);}return out;}
function chance(pct){return Math.random()*100<pct;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function typesList(){return findByName('Dungeon Types');}
function categories(){const c=typesList();if(!c)return[];const set=new Set();c.entries.forEach(e=>(e.tags||[]).forEach(t=>set.add(t)));return[...set];}
function typesInCategory(cat){const c=typesList();if(!c)return[];return cat?c.entries.filter(e=>(e.tags||[]).includes(cat)):c.entries;}
function byAttr(typeName,attrTag){const c=findByName(typeName);if(!c)return[];return c.entries.filter(e=>(e.tags||[]).includes(attrTag)).map(e=>e.name);}
function sizesList(){return findByName('Dungeon Sizes');}
function roomTypesList(){const c=findByName('Room Types');return c?c.entries.map(e=>e.name):[];}
function connectionsList(){const c=findByName('Connections');return c?c.entries.map(e=>e.name):[];}

/* =====================================================================
   FILTERS
   ===================================================================== */
function populateFilters(){
  const catSel=$('#fCat'), typeSel=$('#fType'), sizeSel=$('#fSize');
  const curCat=catSel.value, curType=typeSel.value, curSize=sizeSel.value;
  catSel.innerHTML='<option value="">Any category</option>';
  categories().forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;catSel.appendChild(o);});
  catSel.value=curCat;
  populateTypes(); typeSel.value=curType;
  sizeSel.innerHTML='<option value="">Default</option>';
  const sl=sizesList();
  if(sl) sl.entries.forEach(e=>{const o=document.createElement('option');o.value=o.textContent=e.name;sizeSel.appendChild(o);});
  sizeSel.value=curSize;
  updateSizeNote();
}
function populateTypes(){
  const cat=$('#fCat').value, typeSel=$('#fType');
  typeSel.innerHTML='<option value="">Any type</option>';
  typesInCategory(cat).forEach(e=>{const o=document.createElement('option');o.value=o.textContent=e.name;typeSel.appendChild(o);});
}
function sizeInfo(name){
  const sl=sizesList(); if(!sl)return null;
  const e=sl.entries.find(x=>x.name===name);
  if(!e)return null;
  const min=parseInt((e.fields||{})['Min Rooms'],10), max=parseInt((e.fields||{})['Max Rooms'],10);
  return {name:e.name, desc:e.desc||'', min:isNaN(min)?3:min, max:isNaN(max)?6:max};
}
function updateSizeNote(){
  const v=$('#fSize').value; const s=v?sizeInfo(v):null;
  $('#sizeNote').textContent=s?`${s.min}–${s.max} rooms · ${s.desc}`:'';
}
$('#fCat').addEventListener('change',()=>{populateTypes();});
$('#fSize').addEventListener('change',updateSizeNote);

/* =====================================================================
   GENERATION
   ===================================================================== */
function chooseType(){
  const fType=$('#fType').value, fCat=$('#fCat').value;
  const all=typesList(); if(!all||!all.entries.length)return null;
  if(fType){ const e=all.entries.find(x=>x.name===fType); if(e)return e; }
  const pool=typesInCategory(fCat);
  return pick(pool.length?pool:all.entries);
}
function chooseSize(){
  const fSize=$('#fSize').value;
  const sl=sizesList();
  if(fSize) return sizeInfo(fSize);
  if(sl && sl.entries.length) return sizeInfo(pick(sl.entries).name);
  return {name:'Medium', desc:'A moderately sized dungeon', min:7, max:12};
}
function roomDims(typeName){
  let w,l,h;
  if(GRAND_TYPES.includes(typeName)){w=ri(20,60);l=ri(20,60);h=ri(15,30);}
  else if(NATURAL_TYPES.includes(typeName)){w=ri(15,45);l=ri(15,45);h=ri(8,25);}
  else if(CRAMPED_TYPES.includes(typeName)){w=ri(10,25);l=ri(10,25);h=ri(8,15);}
  else{w=ri(15,35);l=ri(15,35);h=ri(10,20);}
  return `${w} ft × ${l} ft × ${h} ft`;
}
function lighting(typeName){return pick(LIGHTING_BY_TYPE[typeName]||LIGHTING_FALLBACK);}
function roomDescription(roomType,features,furniture,trap,pools){
  const parts=[];
  const env=pick(pools.environments);
  parts.push(env?`This ${roomType.toLowerCase()} is found where ${env.toLowerCase()}`:`This ${roomType.toLowerCase()} stretches before you`);
  if(features.length){
    const intros=['The space is dominated by','Notable features include','Most striking are','The room is characterized by','Immediately apparent are'];
    if(features.length===1) parts.push(`${pick(intros)} ${features[0].toLowerCase()}`);
    else parts.push(`${pick(intros)} ${features.slice(0,-1).join(', ').toLowerCase()}, and ${features[features.length-1].toLowerCase()}`);
  }
  if(furniture.length){
    const intros=['The room contains','Furnishings include','Present within are','Notable objects are','The space holds'];
    if(furniture.length===1) parts.push(`${pick(intros)} ${furniture[0].toLowerCase()}`);
    else parts.push(`${pick(intros)} ${furniture.slice(0,-1).join(', ').toLowerCase()}, and ${furniture[furniture.length-1].toLowerCase()}`);
  }
  const atmos=[];
  if(pools.sounds.length && chance(60)) atmos.push(`the sound of ${pick(pools.sounds).toLowerCase()}`);
  if(pools.smells.length && chance(40)) atmos.push(`the scent of ${pick(pools.smells).toLowerCase()}`);
  if(atmos.length) parts.push(atmos.length===1?`The air carries ${atmos[0]}`:`The atmosphere is filled with ${atmos.join(' and ')}`);
  if(trap){
    const hints=['Something about this room feels subtly wrong','The floor shows unusual wear patterns that suggest hidden mechanisms','Faint scratches on the walls hint at previous disturbances','The careful arrangement of objects seems almost too deliberate','A barely perceptible tension in the air suggests hidden dangers','Close observation reveals signs that this room holds secrets','The shadows seem to conceal more than natural darkness would account for'];
    parts.push(pick(hints));
  }
  return parts.join('. ')+'.';
}
function generateRoom(num,typeName,pools,roomTypes){
  const roomType=pick(roomTypes)||'Chamber';
  const features=sample(pools.room_features,ri(1,Math.min(3,pools.room_features.length||1)));
  const furniture=pools.furniture.length&&chance(60)?sample(pools.furniture,ri(1,Math.min(2,pools.furniture.length))):[];
  const trap=chance(30)?pick(pools.traps):null;
  return{
    number:num, type:roomType, dimensions:roomDims(typeName), features, furniture, trap,
    description:roomDescription(roomType,features,furniture,trap,pools),
    atmosphere:pick(pools.atmospheres)||'Mysterious', lighting:lighting(typeName),
    sounds:pools.sounds.length?pick(pools.sounds):null,
    smells:pools.smells.length?pick(pools.smells):null
  };
}
function generateConnections(n,connTypes){
  const conns={};
  for(let i=1;i<=n;i++){
    const num=ri(1,Math.min(3,Math.max(1,n-1)));
    const options=[]; for(let j=1;j<=n;j++) if(j!==i) options.push(j);
    conns[i]=sample(options,Math.min(num,options.length)).map(to=>({to,via:pick(connTypes)||'Passage'}));
  }
  return conns;
}
function suggestLevel(sizeName,typeName){
  const key=(sizeName||'medium').toLowerCase();
  const base=BASE_LEVEL[key]||4;
  if(DANGEROUS_TYPES.includes(typeName)) return base+ri(2,4);
  if(MAGICAL_TYPES.includes(typeName)) return base+ri(1,3);
  return base+ri(0,2);
}
function estimatedTime(sizeName){ return TIME_ESTIMATE[(sizeName||'medium').toLowerCase()] || '2-4 hours'; }

function generate(){
  if(!library)return;
  const typeEntry=chooseType(); if(!typeEntry)return;
  const size=chooseSize();
  const pools={
    environments: byAttr(typeEntry.name,'environment'),
    room_features: byAttr(typeEntry.name,'room feature'),
    sounds: byAttr(typeEntry.name,'sound'),
    smells: byAttr(typeEntry.name,'smell'),
    atmospheres: byAttr(typeEntry.name,'atmosphere'),
    furniture: byAttr(typeEntry.name,'furniture'),
    traps: byAttr(typeEntry.name,'trap'),
  };
  const roomTypes=roomTypesList(), connTypes=connectionsList();
  const numRooms=ri(size.min,size.max);
  const rooms=[]; for(let i=1;i<=numRooms;i++) rooms.push(generateRoom(i,typeEntry.name,pools,roomTypes));
  const notes=[];
  if(pools.environments.length) notes.push('Environmental theme: '+pick(pools.environments));
  notes.push(pick(GENERAL_HAZARDS));
  const catTag=(typeEntry.tags&&typeEntry.tags[0])||'Dungeon';
  dungeon={
    theme:typeEntry.name, catName:catTag, description:typeEntry.desc||'',
    sizeName:size.name, atmosphere:pick(pools.atmospheres)||'Mysterious', lighting:lighting(typeEntry.name),
    sounds:pools.sounds.length?pick(pools.sounds):null, smells:pools.smells.length?pick(pools.smells):null,
    totalRooms:numRooms, rooms, connections:generateConnections(numRooms,connTypes), notes,
    suggestedLevel:suggestLevel(size.name,typeEntry.name), estimatedTime:estimatedTime(size.name)
  };
  renderDungeon();
}

/* =====================================================================
   RENDER
   ===================================================================== */
function fieldRow(k,v){ return v?`<div class="fld"><span class="k">${esc(k)}</span><div class="v">${esc(v)}</div></div>`:''; }
function renderRoom(r){
  const feats=r.features.map(f=>`<span class="chip">${esc(f)}</span>`).join('');
  const furn=r.furniture.map(f=>`<span class="chip">${esc(f)}</span>`).join('');
  const conns=(dungeon.connections[r.number]||[]).map(c=>`Room ${c.to} <b>via ${esc(c.via)}</b>`).join(' · ');
  const trapHtml=r.trap?`<div class="room-trap">⚠ <span class="gmv">${esc(r.trap)}</span><span class="gmtag">GM</span></div>`:'';
  return `<div class="room">
    <div class="room-head"><span class="room-num">№ ${r.number}</span><span class="room-type">${esc(r.type)}</span><span class="room-dims">${esc(r.dimensions)}</span></div>
    <div class="room-desc">${esc(r.description)}</div>
    <div class="chiprow">${feats}${furn}</div>
    <div class="chiprow"><span class="chip tag">${esc(r.atmosphere)}</span><span class="chip tag">${esc(r.lighting)}</span></div>
    ${trapHtml}
    ${conns?`<div class="room-conn">↳ Connects to ${conns}</div>`:''}
  </div>`;
}
function renderDungeon(){
  const stage=$('#stageInner');
  if(!dungeon){ renderEmptyOrPrompt(); return; }
  const meta=`<span class="metapill"><b>${esc(dungeon.catName)}</b></span>
    <span class="metapill">${esc(dungeon.sizeName)} · ${dungeon.totalRooms} rooms</span>
    <span class="metapill">Suggested level <b>${dungeon.suggestedLevel}</b></span>
    <span class="metapill">${esc(dungeon.estimatedTime)}</span>`;
  const fields=[fieldRow('Atmosphere',dungeon.atmosphere),fieldRow('Lighting',dungeon.lighting),fieldRow('Sounds',dungeon.sounds),fieldRow('Smells',dungeon.smells)].join('');
  const notes=dungeon.notes.map(n=>`<li>${esc(n)}</li>`).join('');
  const rooms=dungeon.rooms.map(renderRoom).join('');
  stage.innerHTML=`<article class="dun">
    <div class="dun-head">
      <h2>${esc(dungeon.theme)}</h2>
      <div class="dun-sub">${esc(dungeon.catName)}</div>
      <div class="dun-desc">${esc(dungeon.description)}</div>
      <div class="metarow">${meta}</div>
    </div>
    <div class="dun-body">
      <div class="sec"><div class="sec-title">Atmosphere</div><div class="fldgrid">${fields}</div></div>
      <div class="sec"><div class="sec-title">Environmental Notes</div><ul class="notelist">${notes}</ul></div>
      <div class="sec"><div class="sec-title">Rooms</div><div class="rooms">${rooms}</div></div>
    </div>
    <div class="dun-foot"><button class="tbtn save" id="saveBtn">✦ Save to log</button><button class="tbtn" id="copyBtn">⧉ Copy text</button></div>
  </article>`;
  $('#saveBtn').onclick=saveCurrent; $('#copyBtn').onclick=copyCurrent;
}
function renderEmptyOrPrompt(){
  const stage=$('#stageInner');
  if(!library){
    stage.innerHTML=`<div class="empty"><div class="big">📖</div><h2>Connect the Codex first</h2>
      <p>This generator rolls against the Codex's <strong>Dungeons</strong> domain. Served alongside the Codex it loads automatically; as a loose <code>file://</code> page, hit <strong>Load Codex</strong> above and choose the file from the Codex's <strong>Export</strong> (or import <code>arcanaforge-starter-pack.json</code> once to add the Dungeons &amp; Environments data).</p>
      <button class="btn ghost" onclick="document.getElementById('codexImport').click()">Load Codex JSON</button></div>`;
  } else if(!typesList()){
    stage.innerHTML=`<div class="empty"><div class="big">🗝️</div><h2>No Dungeons data in this Codex</h2>
      <p>Your Codex is connected but doesn't have a <strong>Dungeons</strong> domain yet. Import <code>arcanaforge-starter-pack.json</code> from the-table folder into your Codex to add it.</p></div>`;
  } else {
    stage.innerHTML=`<div class="empty"><div class="big">🗝️</div><h2>The depths await</h2>
      <p>Pick a category, type and size on the left, then <strong>Generate</strong> to delve a full dungeon — theme, atmosphere, rooms, traps and connections, all rolled from your Codex.</p></div>`;
  }
}

/* =====================================================================
   LOG (roster)
   ===================================================================== */
function loadRoster(){try{const r=JSON.parse(localStorage.getItem(ROSTER_KEY));return Array.isArray(r)?r:[];}catch(e){return[];}}
function saveRoster(){localStorage.setItem(ROSTER_KEY,JSON.stringify(roster));}
function saveCurrent(){if(!dungeon)return;roster.unshift({id:'dun_'+Date.now().toString(36),created:Date.now(),dungeon});saveRoster();renderRoster();toast('Saved "'+dungeon.theme+'" to the delve log.');}
function renderRoster(){
  const wrap=$('#rosterWrap'); if(!roster.length){wrap.style.display='none';return;} wrap.style.display='block';
  $('#rosterGrid').innerHTML=roster.map(r=>{const d=r.dungeon;return `<div class="rcard"><div class="rn">${esc(d.theme)}</div><div class="rm">${esc(d.catName)} · ${esc(d.sizeName||'')} · ${d.totalRooms} rooms</div>
    <div class="ra"><button data-load="${r.id}">Load</button><button class="del" data-del="${r.id}">Delete</button></div></div>`;}).join('');
  $$('[data-load]').forEach(b=>b.onclick=()=>{const r=roster.find(x=>x.id===b.dataset.load);if(r){dungeon=r.dungeon;renderDungeon();window.scrollTo({top:0,behavior:'smooth'});toast('Loaded "'+dungeon.theme+'".');}});
  $$('[data-del]').forEach(b=>b.onclick=()=>{roster=roster.filter(x=>x.id!==b.dataset.del);saveRoster();renderRoster();toast('Removed.');});
}
function copyCurrent(){
  if(!dungeon)return;
  const L=[dungeon.theme,dungeon.catName+' · '+dungeon.sizeName+' · '+dungeon.totalRooms+' rooms',dungeon.description,
    'Atmosphere: '+dungeon.atmosphere,'Lighting: '+dungeon.lighting,'Suggested level: '+dungeon.suggestedLevel,'Estimated time: '+dungeon.estimatedTime,''];
  dungeon.rooms.forEach(r=>{L.push(`Room ${r.number} — ${r.type} (${r.dimensions})`);L.push(r.description);if(r.trap)L.push('  [GM] Trap: '+r.trap);L.push('');});
  navigator.clipboard?.writeText(L.join('\n')).then(()=>toast('Copied to clipboard.'),()=>toast('Copy failed.'));
}

/* =====================================================================
   GM / CODEX IMPORT / LOG EXPORT-IMPORT / MISC
   ===================================================================== */
function applyGM(){document.body.classList.toggle('gm-mode',gmMode);$('#gmSwitch').classList.toggle('on',gmMode);}
$('#gmToggle').onclick=()=>{gmMode=!gmMode;localStorage.setItem(GM_KEY,gmMode?'1':'0');applyGM();};
$('#genBtn').onclick=generate;
$('#loadCodexBtn').onclick=()=>$('#codexImport').click();
$('#codexImport').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);const lib=codexUnwrap(d);if(!lib){toast('That isn’t a Codex export.');return;}codexSaveSnapshot(lib);detectCodex();toast('Codex loaded · '+countEntries(lib).toLocaleString()+' entries.');renderDungeon();}catch(err){toast('Could not read that file.');}};r.readAsText(f);e.target.value='';});
$('#exportLogBtn').onclick=()=>{if(!roster.length){toast('Delve log is empty.');return;}download(JSON.stringify({app:'dungeon-generator',version:1,exported:new Date().toISOString(),dungeons:roster},null,2),'dungeon-log.json');toast('Delve log exported.');};
$('#importLogBtn').onclick=()=>$('#logImport').click();
$('#logImport').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);const arr=d.dungeons||(Array.isArray(d)?d:[]);let n=0;arr.forEach(x=>{if(x&&x.dungeon){x.id=x.id||'dun_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);roster.push(x);n++;}});saveRoster();renderRoster();toast('Imported '+n+' dungeon'+(n===1?'':'s')+'.');}catch(err){toast('Could not read that file.');}};r.readAsText(f);e.target.value='';});
function download(t,name){const b=new Blob([t],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}
let toastT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2200);}
document.addEventListener('keydown',e=>{if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;if(e.code==='Space'||e.key.toLowerCase()==='g'){e.preventDefault();if(library)generate();}});

/* init */
applyGM();detectCodex();renderRoster();renderEmptyOrPrompt();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&!library)detectCodex();});
</script>
<script src="arcanaforge-quicksearch.js"></script>
</body>
